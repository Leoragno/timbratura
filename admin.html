<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Gestione Oratorio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb; --surface: #ffffff; --border: #d8d2c4;
      --ink: #1a1714; --ink2: #5a5148; --ink3: #8a7f72;
      --accent: #2d4a3e; --accent-lt: #e8f0ec;
      --red: #8b2e2e; --red-lt: #f5e8e8;
      --green: #2d5a3d; --green-lt: #e5f2ea;
      --font-serif: 'Instrument Serif', serif;
      --font-mono: 'Geist Mono', monospace;
    }
    body {
      background: var(--bg);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--ink);
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .login-title {
      font-family: var(--font-serif);
      font-size: 32px;
      margin-bottom: 32px;
      text-align: center;
    }
    .login-title em { font-style: italic; color: var(--accent); }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 11px 13px;
      font-family: var(--font-mono);
      font-size: 13px;
      margin-bottom: 16px;
    }
    input:focus { border-color: var(--accent); outline: none; }
    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 10px 18px;
      border: 1px solid transparent;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      width: 100%;
      padding: 12px;
    }
    .btn-primary:hover { background: #1f3329; }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #662121; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--ink3); }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 56px;
    }
    .topbar-title { font-family: var(--font-serif); font-size: 20px; }
    .topbar-title em { font-style: italic; color: var(--accent); }
    .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--ink3);
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      font-weight: 600;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
    }
    .stat-label { font-size: 10px; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
    .stat-value { font-family: var(--font-serif); font-size: 32px; }
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-bar input, .filter-bar select {
      margin-bottom: 0;
      width: auto;
      min-width: 180px;
    }
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }
    th {
      background: var(--bg);
      padding: 12px 14px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--ink3);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--bg);
      font-size: 12px;
    }
    tr:hover { background: var(--bg); }
    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
    }
    .badge-in { background: var(--green-lt); color: var(--green); }
    .badge-out { background: var(--red-lt); color: var(--red); }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: var(--bg);
      border-radius: 4px;
      padding: 12px 18px;
      font-size: 12px;
      transform: translateY(20px);
      opacity: 0;
      transition: all .3s;
      z-index: 300;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border-radius: 4px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
    }
    .modal-title { font-family: var(--font-serif); font-size: 24px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-toggle {
      padding: 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .control-row { display: flex; gap: 14px; margin-bottom: 28px; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-container">
  <div class="login-card">
    <div class="login-title">Admin <em>Oratorio</em></div>
    <input type="password" id="adminPassword" placeholder="Password amministratore" onkeypress="if(event.key==='Enter') doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">Entra →</button>
    <div id="loginError" style="color:var(--red); font-size:12px; margin-top:12px; text-align:center;"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-title">gestione <em>oratorio</em></div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Esci</button>
  </div>
  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Totale Animatori</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Totale Timbrature</div><div class="stat-value" id="StatTimbrature">—</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showPanel('utenti')">👥 Utenti</button>
      <button class="tab" onclick="showPanel('timbrature')">📋 Timbrature</button>
      <button class="tab" onclick="showPanel('blocchi')">🔒 Blocchi</button>
    </div>

    <div id="panelUtenti" class="panel active">
      <div class="filter-bar">
        <input type="text" id="filterUsers" placeholder="Cerca utente..." oninput="renderUtenti()">
        <button class="btn btn-primary" onclick="openAddUserModal()" style="width:auto;">➕ Nuovo</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Nome</th><th>Anno</th><th>Email</th><th>Azioni</th></tr></thead>
          <tbody id="utentiTbody"></tbody>
        </table>
      </div>
    </div>

    <div id="panelTimbrature" class="panel">
      <div class="filter-bar">
        <input type="text" id="filterLog" placeholder="Cerca nome..." oninput="renderTimbrature()">
        <input type="date" id="filterDate" oninput="renderTimbrature()">
        <select id="filterTipo" oninput="renderTimbrature()"><option value="">Tutti</option><option value="Ingresso">Ingresso</option><option value="Uscita">Uscita</option></select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Animatore</th><th>Data</th><th>Ora</th><th>Tipo</th><th>Azioni</th></tr></thead>
          <tbody id="timbratureTbody"></tbody>
        </table>
      </div>
    </div>

    <div id="panelBlocchi" class="panel">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Ingressi</div>
          <div class="stat-value" id="statoIngresso">—</div>
          <button class="btn btn-primary" id="btnToggleIn" style="margin-top:12px; width:100%;">Cambia</button>
        </div>
        <div class="stat-card">
          <div class="stat-label">Uscite</div>
          <div class="stat-value" id="statoUscita">—</div>
          <button class="btn btn-primary" id="btnToggleOut" style="margin-top:12px; width:100%;">Cambia</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modalAddUser" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">➕ Nuovo Animatore</div>
    <input type="text" id="newNome" placeholder="Nome e Cognome">
    <input type="password" id="newPassword" placeholder="Password">
    <input type="number" id="newAnno" placeholder="Anno nascita">
    <input type="email" id="newEmail" placeholder="Email (opzionale)">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modalAddUser')">Annulla</button>
      <button class="btn btn-primary" onclick="aggiungiUtente()">Aggiungi</button>
    </div>
  </div>
</div>

<div id="modalDelete" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">⚠️ Conferma Eliminazione</div>
    <p id="deleteMessage"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modalDelete')">Annulla</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Elimina</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const ADMIN_PASSWORD = 'admin123';

  let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let utentiList = [];
  let timbratureList = [];
  let deleteCallback = null;

  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  async function doLogin() {
    const pw = document.getElementById('adminPassword').value;
    if (pw !== ADMIN_PASSWORD) {
      document.getElementById('loginError').innerText = 'Password errata!';
      return;
    }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    await caricaTuttiIDati();
    await caricaStatoBlocchi();
  }

  function doLogout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  async function caricaTuttiIDati() {
    await caricaUtenti();
    await caricaTimbrature();
    aggiornaStatistiche();
  }

  async function caricaUtenti() {
    const { data, error } = await supabase.from('utenti').select('*').order('id');
    if (error) { toast('Errore utenti: ' + error.message, 'error'); return; }
    utentiList = data || [];
    renderUtenti();
  }

  async function caricaTimbrature() {
    const { data, error } = await supabase.from('timbrature').select('*').order('created_at', { ascending: false });
    if (error) { toast('Errore timbrature: ' + error.message, 'error'); return; }
    timbratureList = data || [];
    renderTimbrature();
  }

  async function caricaStatoBlocchi() {
    const { data, error } = await supabase.from('impostazioni').select('*');
    if (error) {
      toast('Errore caricamento blocchi: ' + error.message, 'error');
      return;
    }
    let ingresso = true, uscita = true;
    data.forEach(row => {
      if (row.chiave === 'ingresso_aperto') ingresso = row.valore;
      if (row.chiave === 'uscita_aperta') uscita = row.valore;
    });
    document.getElementById('statoIngresso').innerHTML = ingresso ? '✅ APERTI' : '🔒 BLOCCATI';
    document.getElementById('statoUscita').innerHTML = uscita ? '✅ APERTE' : '🔒 BLOCCATE';
    document.getElementById('statoIngresso').style.color = ingresso ? 'var(--green)' : 'var(--red)';
    document.getElementById('statoUscita').style.color = uscita ? 'var(--green)' : 'var(--red)';
    
    // Attacca eventi bottoni blocchi
    document.getElementById('btnToggleIn').onclick = () => toggleBlocco('ingresso_aperto', !ingresso);
    document.getElementById('btnToggleOut').onclick = () => toggleBlocco('uscita_aperta', !uscita);
  }

  async function toggleBlocco(chiave, nuovoValore) {
    const { error } = await supabase.from('impostazioni').update({ valore: nuovoValore }).eq('chiave', chiave);
    if (error) {
      toast('Errore: ' + error.message, 'error');
    } else {
      toast('Stato aggiornato!', 'success');
      await caricaStatoBlocchi();
    }
  }

  function renderUtenti() {
    const filter = document.getElementById('filterUsers')?.value.toLowerCase() || '';
    const filtered = utentiList.filter(u => u.nome.toLowerCase().includes(filter));
    const tbody = document.getElementById('utentiTbody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nessun utente</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(u => `
      <tr>
        <td>${u.id}</td>
        <td><strong>${escapeHtml(u.nome)}</strong></td>
        <td>${u.anno || '—'}</td>
        <td>${u.email || '—'}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="apriEliminaUtente(${u.id}, '${escapeHtml(u.nome)}')">🗑️ Elimina</button>
        </td>
      </tr>
    `).join('');
  }

  function renderTimbrature() {
    const search = document.getElementById('filterLog')?.value.toLowerCase() || '';
    const date = document.getElementById('filterDate')?.value || '';
    const tipo = document.getElementById('filterTipo')?.value || '';
    
    let filtered = timbratureList.filter(t => {
      if (search && !t.nome.toLowerCase().includes(search)) return false;
      if (tipo && t.tipo !== tipo) return false;
      if (date) {
        const parts = t.data.split('/');
        const rowDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
        if (rowDate !== date) return false;
      }
      return true;
    });
    
    const tbody = document.getElementById('timbratureTbody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nessuna timbratura</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(t => `
      <tr>
        <td>${t.id}</td>
        <td>${escapeHtml(t.nome)}</td>
        <td>${t.data}</td>
        <td>${t.ora}</td>
        <td><span class="badge ${t.tipo === 'Ingresso' ? 'badge-in' : 'badge-out'}">${t.tipo}</span></td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="apriEliminaTimbratura(${t.id})">🗑️ Elimina</button>
        </td>
      </tr>
    `).join('');
  }

  function aggiornaStatistiche() {
    document.getElementById('statTotal').textContent = utentiList.length;
    document.getElementById('StatTimbrature').textContent = timbratureList.length;
  }

  function openAddUserModal() {
    document.getElementById('newNome').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newAnno').value = '';
    document.getElementById('newEmail').value = '';
    openModal('modalAddUser');
  }

  async function aggiungiUtente() {
    const nome = document.getElementById('newNome').value.trim();
    const password = document.getElementById('newPassword').value;
    const anno = document.getElementById('newAnno').value;
    const email = document.getElementById('newEmail').value.trim();
    
    if (!nome || !password) {
      toast('Nome e password obbligatori', 'error');
      return;
    }
    if (password.length < 4) {
      toast('Password almeno 4 caratteri', 'error');
      return;
    }
    
    const { error } = await supabase.from('utenti').insert([{
      nome, password, anno: anno ? parseInt(anno) : null, email: email || null, created_at: new Date()
    }]);
    
    if (error) {
      if (error.code === '23505') toast('Nome già esistente!', 'error');
      else toast('Errore: ' + error.message, 'error');
      return;
    }
    
    toast('✅ Utente aggiunto!', 'success');
    closeModal('modalAddUser');
    await caricaUtenti();
    aggiornaStatistiche();
  }

  function apriEliminaUtente(id, nome) {
    document.getElementById('deleteMessage').innerHTML = `Eliminare <strong>${nome}</strong> e tutte le sue timbrature?`;
    deleteCallback = async () => {
      // Elimina timbrature dell'utente
      await supabase.from('timbrature').delete().eq('nome', nome);
      // Elimina utente
      const { error } = await supabase.from('utenti').delete().eq('id', id);
      if (error) { toast('Errore: ' + error.message, 'error'); return; }
      toast(`✅ ${nome} eliminato!`, 'success');
      closeModal('modalDelete');
      await caricaTuttiIDati();
    };
    openModal('modalDelete');
  }

  function apriEliminaTimbratura(id) {
    document.getElementById('deleteMessage').innerHTML = `Eliminare questa timbratura?`;
    deleteCallback = async () => {
      const { error } = await supabase.from('timbrature').delete().eq('id', id);
      if (error) { toast('Errore: ' + error.message, 'error'); return; }
      toast('✅ Timbratura eliminata!', 'success');
      closeModal('modalDelete');
      await caricaTimbrature();
      aggiornaStatistiche();
    };
    openModal('modalDelete');
  }

  document.getElementById('confirmDeleteBtn').onclick = () => { if (deleteCallback) deleteCallback(); };

  function showPanel(panel) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (panel === 'utenti') {
      document.getElementById('panelUtenti').classList.add('active');
      document.querySelectorAll('.tab')[0].classList.add('active');
    } else if (panel === 'timbrature') {
      document.getElementById('panelTimbrature').classList.add('active');
      document.querySelectorAll('.tab')[1].classList.add('active');
    } else if (panel === 'blocchi') {
      document.getElementById('panelBlocchi').classList.add('active');
      document.querySelectorAll('.tab')[2].classList.add('active');
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  window.onload = () => {
    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      caricaTuttiIDati();
      caricaStatoBlocchi();
    }
  };
</script>
</body>
</html>
