<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Timbratura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2eb;
      --bg2:       #ede9df;
      --surface:   #ffffff;
      --border:    #d8d2c4;
      --border2:   #c5bead;
      --ink:       #1a1714;
      --ink2:      #5a5148;
      --ink3:      #8a7f72;
      --accent:    #2d4a3e;
      --accent-lt: #e8f0ec;
      --red:       #8b2e2e;
      --red-lt:    #f5e8e8;
      --amber:     #7a5c1e;
      --amber-lt:  #fdf3dc;
      --green:     #2d5a3d;
      --green-lt:  #e5f2ea;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono:  'Geist Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(180,160,100,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(100,130,110,.06) 0%, transparent 60%);
    }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 44px 40px;
      box-shadow: 0 2px 24px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.03);
      animation: riseIn .4s cubic-bezier(.23,1,.32,1) both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-eyebrow {
      font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--ink3); margin-bottom: 8px;
    }

    .login-title {
      font-family: var(--font-serif); font-size: 32px;
      line-height: 1.1; color: var(--ink);
      margin-bottom: 32px;
    }

    .login-title em { font-style: italic; color: var(--accent); }

    label {
      display: block; font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }

    input[type="password"], input[type="text"], input[type="time"], input[type="date"], select, input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 11px 13px;
      font-family: var(--font-mono); font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      margin-bottom: 16px;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,74,62,.12);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px;
      border: 1px solid transparent;
      border-radius: 3px;
      font-family: var(--font-mono); font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .3px;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
      width: 100%;  justify-content: center; padding: 12px;
    }
    .btn-primary:hover:not(:disabled) { background: #1f3329; }

    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-green { background: var(--green-lt); color: var(--green); border-color: #b2d4bc; }
    .btn-red { background: var(--red-lt); color: var(--red); border-color: #dbb2b2; }
    .btn-amber { background: var(--amber-lt); color: var(--amber); border-color: #e0cfa0; }
    .btn-ghost { background: transparent; color: var(--ink3); border-color: var(--border); }

    .login-err { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

    /* MAIN APP */
    #app { display: none; position: relative; z-index: 1; min-height: 100vh; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }

    .topbar-title { font-family: var(--font-serif); font-size: 20px; }
    .topbar-title em { font-style: italic; color: var(--accent); }
    .topbar-badge {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      background: var(--accent-lt); color: var(--accent);
      padding: 3px 8px; border-radius: 20px;
      border: 1px solid #b2ccbc;
    }

    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .live-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); }
    .live-dot::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(.7); }
    }

    .topbar-clock { font-size: 12px; color: var(--ink3); }
    .main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px 22px; }
    .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
    .stat-value { font-family: var(--font-serif); font-size: 40px; line-height: 1; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-family: var(--font-serif); font-size: 22px; font-style: italic; }

    .control-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;
      margin-bottom: 28px;
    }
    .btn-toggle {
      width: 100%; padding: 14px; font-family: var(--font-mono); font-size: 13px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center;
      transition: background .2s, color .2s, border-color .2s;
    }
    .btn-toggle.open {
      background: var(--green-lt); color: var(--green); border-color: #b2d4bc;
    }
    .btn-toggle.locked {
      background: var(--red-lt); color: var(--red); border-color: #dbb2b2;
    }

    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar input, .filter-bar select { margin-bottom: 0; width: auto; flex: 1; min-width: 140px; }

    .status-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: 12px; margin-bottom: 32px;
    }

    .animator-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 18px; }
    .animator-card.inside { border-left: 3px solid var(--green); }
    .animator-card.outside { border-left: 3px solid var(--border2); }
    .anim-name { font-family: var(--font-serif); font-size: 18px; margin-bottom: 4px; }
    .anim-name span { font-size: 13px; color: var(--ink3); margin-left: 6px; }

    .anim-status {
      display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 20px; margin-bottom: 12px;
    }
    .anim-status.in { background: var(--green-lt); color: var(--green); }
    .anim-status.out { background: var(--bg2); color: var(--ink3); }
    .anim-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .anim-status.in::before { background: var(--green); }
    .anim-status.out::before { background: var(--ink3); }

    .anim-last { font-size: 11px; color: var(--ink3); margin-bottom: 12px; }
    .anim-actions { display: flex; gap: 4px; flex-wrap: wrap; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; min-width: 750px; }
    th {
      background: var(--bg2); padding: 12px 14px; text-align: left;
      font-size: 10px; text-transform: uppercase; color: var(--ink3);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 14px; border-bottom: 1px solid var(--bg2); font-size: 12px; }
    tr:hover { background: var(--bg); }

    .tipo-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
    .tipo-badge.ingresso { background: var(--green-lt); color: var(--green); }
    .tipo-badge.uscita { background: var(--red-lt); color: var(--red); }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 200; background: rgba(26,23,20,.45);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 36px 32px; width: 100%; max-width: 400px;
    }
    .modal-title { font-family: var(--font-serif); font-size: 24px; font-style: italic; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--bg);
      border-radius: 4px; padding: 12px 18px; font-size: 12px;
