<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console Admin - Oratorio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb; --surface: #ffffff; --border: #d8d2c4;
      --ink: #1a1714; --ink2: #5a5148; --ink3: #8a7f72;
      --accent: #2d4a3e; --accent-lt: #e8f0ec;
      --red: #8b2e2e; --red-lt: #f5e8e8;
      --green: #2d5a3d; --green-lt: #e5f2ea;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'Geist Mono', monospace;
    }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-mono); font-size: 13px; padding: 24px; }
    .admin-card { max-width: 600px; margin: 20px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px; box-shadow: 0 4px 12px rgba(0,0,0,.04); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .admin-title { font-family: var(--font-serif); font-size: 28px; color: var(--accent); }
    .toggle-wrapper { display: flex; gap: 12px; margin-bottom: 24px; }
    .btn-toggle { flex: 1; padding: 15px; font-family: var(--font-mono); font-size: 13px; font-weight: 600; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
    .admin-table { width: 100%; border-collapse: collapse; text-align: left; }
    .admin-table th, .admin-table td { padding: 10px; border-bottom: 1px solid var(--border); }
    .admin-table th { background: var(--accent-lt); color: var(--accent); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
    .badge { padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; display: inline-block; }
    .badge-in { background: var(--green-lt); color: var(--green); }
    .badge-out { background: var(--red-lt); color: var(--red); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); border-radius: 4px; padding: 12px 24px; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="admin-card">
    <div class="admin-header">
      <div class="admin-title">Pannello Admin 🛠️</div>
      <button onclick="caricaRegistroAdmin()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:3px; cursor:pointer; font-family:var(--font-mono);">Aggiorna 🔄</button>
    </div>
    
    <p style="margin-bottom: 10px; font-weight: 600; color: var(--ink2);">Stato pulsanti ragazzi:</p>
    <div class="toggle-wrapper">
      <button id="toggle-in-btn" class="btn-toggle" onclick="toggleStato('ingresso_aperto')">Ingressi: Caricamento...</button>
      <button id="toggle-out-btn" class="btn-toggle" onclick="toggleStato('uscita_aperta')">Uscite: Caricamento...</button>
    </div>

    <p style="margin-bottom: 10px; font-weight: 600; color: var(--ink2); border-top: 1px solid var(--border); padding-top: 20px;">Ultime Timbrature Ricevute:</p>
    <div class="table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Animatore</th>
            <th>Anno</th>
            <th>Data</th>
            <th>Ora</th>
            <th>Azione</th>
          </tr>
        </thead>
        <tbody id="admin-table-body">
          <tr><td colspan="5" style="text-align:center; color:var(--ink3);">Caricamento registro...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let ingressoAperto = true;
    let uscitaAperta = true;

    window.addEventListener('load', async () => {
      await scaricaStatoBlocchi();
      await caricaRegistroAdmin();
    });

    async function scaricaStatoBlocchi() {
      const { data, error } = await supabaseClient.from('impostazioni').select('*');
      if (!error && data) {
        data.forEach(row => {
          if (row.chiave === 'ingresso_aperto') ingressoAperto = row.valore;
          if (row.chiave === 'uscita_aperta') uscitaAperta = row.valore;
        });
        aggiornaGraficaBottoni();
      }
    }

    function aggiornaGraficaBottoni() {
      const btnIn = document.getElementById('toggle-in-btn');
      const btnOut = document.getElementById('toggle-out-btn');

      btnIn.textContent = ingressoAperto ? 'Ingressi: ATTIVI (Clicca per bloccare)' : 'Ingressi: BLOCCATI (Clicca per attivare)';
      btnIn.style.background = ingressoAperto ? 'var(--green-lt)' : 'var(--red-lt)';
      btnIn.style.color = ingressoAperto ? 'var(--green)' : 'var(--red)';

      btnOut.textContent = uscitaAperta ? 'Uscite: ATTIVE (Clicca per bloccare)' : 'Uscite: BLOCCATE (Clicca per attivare)';
      btnOut.style.background = uscitaAperta ? 'var(--green-lt)' : 'var(--red-lt)';
      btnOut.style.color = uscitaAperta ? 'var(--green)' : 'var(--red)';
    }

    async function toggleStato(chiave) {
      const statoCorrente = chiave === 'ingresso_aperto' ? ingressoAperto : uscitaAperta;
      const { error } = await supabaseClient.from('impostazioni').update({ valore: !statoCorrente }).eq('chiave', chiave);
      
      if (error) {
        showToast('Errore: ' + error.message);
      } else {
        showToast('Database aggiornato!');
        await scaricaStatoBlocchi();
      }
    }

    async function caricaRegistroAdmin() {
      const tbody = document.getElementById('admin-table-body');
      const { data, error } = await supabaseClient.from('timbrature').select('*').order('id', { ascending: false }).limit(40);

      if (error) { tbody.innerHTML = `<tr><td colspan="5">Errore nel caricamento dei dati</td></tr>`; return; }
      if (!data || data.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Nessuna timbratura oggi.</td></tr>`; return; }

      tbody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        const badgeClass = row.tipo === 'Ingresso' ? 'badge-in' : 'badge-out';
        tr.innerHTML = `<td><b>${row.nome}</b></td><td>${row.anno || '—'}</td><td>${row.data}</td><td>${row.ora}</td><td><span class="badge ${badgeClass}">${row.tipo}</span></td>`;
        tbody.appendChild(tr);
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
