<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Timbratura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2eb;
      --bg2:       #ede9df;
      --surface:   #ffffff;
      --border:    #d8d2c4;
      --border2:   #c5bead;
      --ink:       #1a1714;
      --ink2:      #5a5148;
      --ink3:      #8a7f72;
      --accent:    #2d4a3e;
      --accent-lt: #e8f0ec;
      --red:       #8b2e2e;
      --red-lt:    #f5e8e8;
      --amber:     #7a5c1e;
      --amber-lt:  #fdf3dc;
      --green:     #2d5a3d;
      --green-lt:  #e5f2ea;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono:  'Geist Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 44px 40px;
      box-shadow: 0 2px 24px rgba(0,0,0,.07);
    }

    .login-title {
      font-family: var(--font-serif); font-size: 32px;
      margin-bottom: 32px;
    }
    .login-title em { font-style: italic; color: var(--accent); }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 11px 13px;
      font-family: var(--font-mono);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-flex;
      padding: 12px 18px;
      border: 1px solid transparent;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      justify-content: center;
    }

    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-green { background: var(--green-lt); color: var(--green); border-color: #b2d4bc; }
    .btn-red { background: var(--red-lt); color: var(--red); border-color: #dbb2b2; }
    .btn-amber { background: var(--amber-lt); color: var(--amber); border-color: #e0cfa0; }
    .btn-ghost { background: transparent; color: var(--ink3); border-color: var(--border); }

    .login-err { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

    /* APP */
    #app { display: none; min-height: 100vh; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 56px;
    }

    .topbar-title { font-family: var(--font-serif); font-size: 20px; }
    .topbar-title em { font-style: italic; color: var(--accent); }

    .main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
    }

    .stat-label { font-size: 10px; text-transform: uppercase; color: var(--ink3); }
    .stat-value { font-family: var(--font-serif); font-size: 40px; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-title { font-family: var(--font-serif); font-size: 22px; font-style: italic; }

    .control-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .btn-toggle {
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-toggle.open { background: var(--green-lt); color: var(--green); }
    .btn-toggle.locked { background: var(--red-lt); color: var(--red); }

    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-bar input, .filter-bar select {
      margin-bottom: 0;
      width: auto;
      flex: 1;
      min-width: 140px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .animator-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
    }

    .animator-card.inside { border-left: 3px solid var(--green); }
    .anim-name { font-family: var(--font-serif); font-size: 18px; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--bg2); }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: var(--bg);
      border-radius: 4px;
      padding: 12px 18px;
      transform: translateY(20px);
      opacity: 0;
      transition: all .3s;
      z-index: 300;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .empty { text-align: center; padding: 48px; color: var(--ink3); }

    .sett-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .disp-block { margin-bottom: 32px; }
    .disp-block-title { font-family: var(--font-serif); font-size: 20px; }
    .disp-counters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .dcnt { padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .dcnt-si { background: var(--green-lt); color: var(--green); }
    .dcnt-for { background: var(--amber-lt); color: var(--amber); }
    .dcnt-no { background: var(--red-lt); color: var(--red); }
    .dcnt-nd { background: var(--bg2); color: var(--ink3); }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-title">Accesso <em>Admin</em></div>
    <input type="password" id="admin-pass" placeholder="Password" />
    <button class="btn btn-primary" id="loginBtn">Entra →</button>
    <div class="login-err" id="login-err">Password errata</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">tim<em>bratura</em> - Admin</div>
    <button class="btn btn-ghost btn-sm" id="logoutBtn">Esci</button>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Totale animatori</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Dentro ora</div><div class="stat-value" id="stat-in">—</div></div>
      <div class="stat-card"><div class="stat-label">Fuori ora</div><div class="stat-value" id="stat-out">—</div></div>
    </div>

    <div class="section-header">
      <div class="section-title">Controllo accessi</div>
    </div>
    <div class="control-row">
      <button id="toggle-in-btn" class="btn-toggle">Ingressi: ATTIVI</button>
      <button id="toggle-out-btn" class="btn-toggle">Uscite: ATTIVE</button>
    </div>

    <div class="section-header">
      <div class="section-title">Stato animatori</div>
      <button class="btn btn-sm btn-ghost" id="refreshBtn">↻ Aggiorna</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="filter-name" placeholder="Cerca nome...">
      <select id="filter-status">
        <option value="">Tutti</option>
        <option value="inside">Dentro</option>
        <option value="outside">Fuori</option>
      </select>
    </div>

    <div class="status-grid" id="animators-grid">
      <div class="empty">⏳ Caricamento...</div>
    </div>

    <div class="section-header">
      <div class="section-title">Log timbrature</div>
    </div>

    <div class="filter-bar">
      <input type="text" id="log-search" placeholder="Cerca nome...">
      <input type="date" id="log-date">
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Nome</th><th>Data</th><th>Ora</th><th>Tipo</th><th></th></tr></thead>
        <tbody id="log-tbody"><tr><td colspan="5" class="empty">Caricamento...</td></tr></tbody>
      </table>
    </div>

    <div class="section-header">
      <div class="section-title">Settimane</div>
      <button class="btn btn-sm btn-primary" id="add-sett-btn">+ Aggiungi</button>
    </div>
    <div id="settimane-list"><div class="empty">Caricamento...</div></div>

    <div class="section-header">
      <div class="section-title">Riepilogo disponibilità</div>
      <button class="btn btn-sm btn-ghost" id="refresh-disp-btn">↻ Aggiorna</button>
    </div>
    <div id="admin-disp-container"><div class="empty">Caricamento...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const ADMIN_PASSWORD = 'admin123';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let allAnimators = [];
  let allLog = [];
  let ingressoAperto = true;
  let uscitaAperta = true;

  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + (type || '') + ' show';
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m];
    });
  }

  // LOGIN
  document.getElementById('loginBtn').onclick = function() {
    const pw = document.getElementById('admin-pass').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadAllData();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  };

  document.getElementById('logoutBtn').onclick = function() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  };

  // CARICAMENTO DATI
  async function loadAllData() {
    await loadSettings();
    await loadUsers();
    await loadTimbrature();
    renderAnimators();
    renderLog();
    updateStats();
    await loadSettimane();
    await loadDispRiepilogo();
  }

  async function loadSettings() {
    const { data } = await supabase.from('impostazioni').select('*');
    if (data) {
      data.forEach(function(row) {
        if (row.chiave === 'ingresso_aperto') ingressoAperto = row.valore;
        if (row.chiave === 'uscita_aperta') uscitaAperta = row.valore;
      });
    }
    const btnIn = document.getElementById('toggle-in-btn');
    const btnOut = document.getElementById('toggle-out-btn');
    btnIn.textContent = ingressoAperto ? '🔓 INGRESSI: ATTIVI' : '🔒 INGRESSI: BLOCCATI';
    btnIn.className = 'btn-toggle ' + (ingressoAperto ? 'open' : 'locked');
    btnOut.textContent = uscitaAperta ? '🔓 USCITE: ATTIVE' : '🔒 USCITE: BLOCCATE';
    btnOut.className = 'btn-toggle ' + (uscitaAperta ? 'open' : 'locked');
  }

  async function loadUsers() {
    const { data } = await supabase.from('utenti').select('*');
    allAnimators = data || [];
  }

  async function loadTimbrature() {
    const { data } = await supabase.from('timbrature').select('*').order('id', { ascending: false });
    allLog = data || [];
  }

  function renderAnimators() {
    const search = document.getElementById('filter-name').value.toLowerCase();
    const statusFilter = document.getElementById('filter-status').value;

    const lastStampMap = {};
    allLog.forEach(log => { if (!lastStampMap[log.nome]) lastStampMap[log.nome] = log; });

    let list = allAnimators.map(a => ({
      nome: a.nome,
      anno: a.anno,
      lastStamp: lastStampMap[a.nome] || null,
      isInside: lastStampMap[a.nome]?.tipo === 'Ingresso'
    }));

    if (search) list = list.filter(a => a.nome.toLowerCase().includes(search));
    if (statusFilter === 'inside') list = list.filter(a => a.isInside);
    if (statusFilter === 'outside') list = list.filter(a => !a.isInside);

    const grid = document.getElementById('animators-grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">Nessun animatore trovato</div>';
      return;
    }

    grid.innerHTML = list.map(a => `
      <div class="animator-card ${a.isInside ? 'inside' : 'outside'}">
        <div class="anim-name">${escapeHtml(a.nome)} (${a.anno || '—'})</div>
        <div style="font-size:11px; color:var(--ink3); margin-top:8px;">
          ${a.lastStamp ? `${a.lastStamp.tipo} — ${a.lastStamp.data} ${a.lastStamp.ora}` : 'Nessuna timbratura'}
        </div>
      </div>
    `).join('');
  }

  function renderLog() {
    const search = document.getElementById('log-search').value.toLowerCase();
    const date = document.getElementById('log-date').value;

    let filtered = allLog.filter(l => {
      if (search && !l.nome.toLowerCase().includes(search)) return false;
      if (date) {
        const parts = l.data.split('/');
        const logDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
        if (logDate !== date) return false;
      }
      return true;
    });

    const tbody = document.getElementById('log-tbody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Nessuna timbratura</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(l => `
      <tr>
        <td><strong>${escapeHtml(l.nome)}</strong></td>
        <td>${escapeHtml(l.data)}</td>
        <td>${escapeHtml(l.ora)}</td>
        <td><span style="background:${l.tipo === 'Ingresso' ? '#e5f2ea' : '#f5e8e8'}; padding:2px 8px; border-radius:20px;">${l.tipo}</span></td>
        <td><button class="btn btn-ghost btn-sm" onclick="deleteLog(${l.id})">🗑️</button></td>
      </tr>
    `).join('');
  }

  window.deleteLog = async function(id) {
    if (!confirm('Eliminare questa timbratura?')) return;
    const { error } = await supabase.from('timbrature').delete().eq('id', id);
    if (error) toast('Errore', 'error');
    else { toast('Eliminata', 'success'); await loadTimbrature(); renderLog(); updateStats(); renderAnimators(); }
  };

  function updateStats() {
    document.getElementById('stat-total').textContent = allAnimators.length;
    const lastMap = {};
    allLog.forEach(l => { if (!lastMap[l.nome]) lastMap[l.nome] = l; });
    let inside = 0;
    for (const nome in lastMap) if (lastMap[nome].tipo === 'Ingresso') inside++;
    document.getElementById('stat-in').textContent = inside;
    document.getElementById('stat-out').textContent = allAnimators.length - inside;
  }

  // SETTIMANE E DISPONIBILITA'
  async function loadSettimane() {
    const { data } = await supabase.from('settimane').select('*').order('id');
    const container = document.getElementById('settimane-list');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">Nessuna settimana</div>';
      return;
    }
    container.innerHTML = data.map(s => `
      <div class="sett-card">
        <div><strong>${escapeHtml(s.nome)}</strong><br><span style="font-size:11px; color:var(--ink3);">${escapeHtml(s.date_info || '')}</span></div>
        <button class="btn btn-red btn-sm" onclick="deleteSettimana(${s.id})">🗑️</button>
      </div>
    `).join('');
  }

  window.deleteSettimana = async function(id) {
    if (!confirm('Eliminare questa settimana?')) return;
    await supabase.from('settimane').delete().eq('id', id);
    await supabase.from('disponibilita').delete().eq('settimana_id', id);
    toast('Eliminata', 'success');
    await loadSettimane();
    await loadDispRiepilogo();
  };

  document.getElementById('add-sett-btn').onclick = async function() {
    const nome = prompt('Nome settimana:');
    if (!nome) return;
    const dateInfo = prompt('Date (es. 10-14 Giugno):');
    const { error } = await supabase.from('settimane').insert([{ nome, date_info: dateInfo }]);
    if (error) toast('Errore: ' + error.message, 'error');
    else { toast('Aggiunta!', 'success'); await loadSettimane(); await loadDispRiepilogo(); }
  };

  async function loadDispRiepilogo() {
    const { data: settimane } = await supabase.from('settimane').select('*');
    const { data: dispo } = await supabase.from('disponibilita').select('*');
    const { data: utenti } = await supabase.from('utenti').select('id');

    const container = document.getElementById('admin-disp-container');
    if (!settimane || settimane.length === 0) {
      container.innerHTML = '<div class="empty">Nessuna settimana</div>';
      return;
    }

    let html = '';
    for (const s of settimane) {
      const dispoSett = dispo ? dispo.filter(d => d.settimana_id === s.id) : [];
      
      let disponibili = 0, forse = 0, nonDisponibili = 0;
      dispoSett.forEach(d => {
        if (d.stato === 'disponibile') disponibili++;
        else if (d.stato === 'forse') forse++;
        else if (d.stato === 'non_disponibile') nonDisponibili++;
      });
      
      const utentiCheHannoCompilato = new Set(dispoSett.map(d => d.user_id)).size;
      const totaleUtenti = utenti ? utenti.length : 0;
      const nonCompilato = totaleUtenti - utentiCheHannoCompilato;

      html += `
        <div class="disp-block">
          <div class="disp-block-title">📅 ${escapeHtml(s.nome)}</div>
          <div class="disp-block-date">${escapeHtml(s.date_info || '')}</div>
          <div class="disp-counters">
            <span class="dcnt dcnt-si">✅ ${disponibili} disponibilità</span>
            <span class="dcnt dcnt-for">🤔 ${forse} forse</span>
            <span class="dcnt dcnt-no">❌ ${nonDisponibili} non disponibili</span>
            <span class="dcnt dcnt-nd">📝 ${nonCompilato} senza dati</span>
          </div>
          <div style="font-size:11px; color:var(--ink3);">👥 ${utentiCheHannoCompilato}/${totaleUtenti} animatori hanno compilato</div>
        </div>
      `;
    }
    container.innerHTML = html;
  }

  // FILTRI
  document.getElementById('filter-name').addEventListener('input', renderAnimators);
  document.getElementById('filter-status').addEventListener('change', renderAnimators);
  document.getElementById('log-search').addEventListener('input', renderLog);
  document.getElementById('log-date').addEventListener('change', renderLog);
  document.getElementById('refreshBtn').addEventListener('click', async () => { await loadTimbrature(); renderAnimators(); renderLog(); updateStats(); });
  document.getElementById('refresh-disp-btn').addEventListener('click', loadDispRiepilogo);

  // TOGGLE LOCK
  document.getElementById('toggle-in-btn').onclick = async function() {
    ingressoAperto = !ingressoAperto;
    await supabase.from('impostazioni').upsert({ chiave: 'ingresso_aperto', valore: ingressoAperto });
    loadSettings();
    toast(ingressoAperto ? 'Ingressi aperti' : 'Ingressi bloccati', ingressoAperto ? 'success' : 'error');
  };
  document.getElementById('toggle-out-btn').onclick = async function() {
    uscitaAperta = !uscitaAperta;
    await supabase.from('impostazioni').upsert({ chiave: 'uscita_aperta', valore: uscitaAperta });
    loadSettings();
    toast(uscitaAperta ? 'Uscite aperte' : 'Uscite bloccate', uscitaAperta ? 'success' : 'error');
  };

  // CHECK SESSIONE
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAllData();
  }
})();
</script>
</body>
</html>
