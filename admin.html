<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Timbratura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2eb;
      --bg2:       #ede9df;
      --surface:   #ffffff;
      --border:    #d8d2c4;
      --border2:   #c5bead;
      --ink:       #1a1714;
      --ink2:      #5a5148;
      --ink3:      #8a7f72;
      --accent:    #2d4a3e;
      --accent-lt: #e8f0ec;
      --red:       #8b2e2e;
      --red-lt:    #f5e8e8;
      --amber:     #7a5c1e;
      --amber-lt:  #fdf3dc;
      --green:     #2d5a3d;
      --green-lt:  #e5f2ea;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono:  'Geist Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(180,160,100,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(100,130,110,.06) 0%, transparent 60%);
    }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 44px 40px;
      box-shadow: 0 2px 24px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.03);
      animation: riseIn .4s cubic-bezier(.23,1,.32,1) both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-eyebrow {
      font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--ink3); margin-bottom: 8px;
    }

    .login-title {
      font-family: var(--font-serif); font-size: 32px;
      line-height: 1.1; color: var(--ink);
      margin-bottom: 32px;
    }

    .login-title em { font-style: italic; color: var(--accent); }

    label {
      display: block; font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }

    input[type="password"], input[type="text"], input[type="time"], input[type="date"], select, input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 11px 13px;
      font-family: var(--font-mono); font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      margin-bottom: 16px;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,74,62,.12);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px;
      border: 1px solid transparent;
      border-radius: 3px;
      font-family: var(--font-mono); font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .3px;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
      width: 100%;  justify-content: center; padding: 12px;
    }
    .btn-primary:hover:not(:disabled) { background: #1f3329; }

    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-green { background: var(--green-lt); color: var(--green); border-color: #b2d4bc; }
    .btn-red { background: var(--red-lt); color: var(--red); border-color: #dbb2b2; }
    .btn-amber { background: var(--amber-lt); color: var(--amber); border-color: #e0cfa0; }
    .btn-ghost { background: transparent; color: var(--ink3); border-color: var(--border); }

    .login-err { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

    /* MAIN APP */
    #app { display: none; position: relative; z-index: 1; min-height: 100vh; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }

    .topbar-title { font-family: var(--font-serif); font-size: 20px; }
    .topbar-title em { font-style: italic; color: var(--accent); }
    .topbar-badge {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      background: var(--accent-lt); color: var(--accent);
      padding: 3px 8px; border-radius: 20px;
      border: 1px solid #b2ccbc;
    }

    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .live-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); }
    .live-dot::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(.7); }
    }

    .topbar-clock { font-size: 12px; color: var(--ink3); }
    .main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px 22px; }
    .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
    .stat-value { font-family: var(--font-serif); font-size: 40px; line-height: 1; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-family: var(--font-serif); font-size: 22px; font-style: italic; }

    .control-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;
      margin-bottom: 28px;
    }
    .btn-toggle {
      width: 100%; padding: 14px; font-family: var(--font-mono); font-size: 13px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center;
    }

    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar input, .filter-bar select { margin-bottom: 0; width: auto; flex: 1; min-width: 140px; }

    .status-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: 12px; margin-bottom: 32px;
    }

    .animator-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 18px; }
    .animator-card.inside { border-left: 3px solid var(--green); }
    .animator-card.outside { border-left: 3px solid var(--border2); }
    .anim-name { font-family: var(--font-serif); font-size: 18px; margin-bottom: 4px; }
    .anim-name span { font-size: 13px; color: var(--ink3); margin-left: 6px; }

    .anim-status {
      display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 20px; margin-bottom: 12px;
    }
    .anim-status.in { background: var(--green-lt); color: var(--green); }
    .anim-status.out { background: var(--bg2); color: var(--ink3); }
    .anim-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .anim-status.in::before { background: var(--green); }
    .anim-status.out::before { background: var(--ink3); }

    .anim-last { font-size: 11px; color: var(--ink3); margin-bottom: 12px; }
    .anim-actions { display: flex; gap: 4px; flex-wrap: wrap; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; min-width: 750px; }
    th {
      background: var(--bg2); padding: 12px 14px; text-align: left;
      font-size: 10px; text-transform: uppercase; color: var(--ink3);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 14px; border-bottom: 1px solid var(--bg2); font-size: 12px; }
    tr:hover { background: var(--bg); }

    .tipo-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
    .tipo-badge.ingresso { background: var(--green-lt); color: var(--green); }
    .tipo-badge.uscita { background: var(--red-lt); color: var(--red); }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 200; background: rgba(26,23,20,.45);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 36px 32px; width: 100%; max-width: 400px;
    }
    .modal-title { font-family: var(--font-serif); font-size: 24px; font-style: italic; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--bg);
      border-radius: 4px; padding: 12px 18px; font-size: 12px;
      transform: translateY(20px); opacity: 0; transition: all .3s;
      z-index: 300;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .empty { text-align: center; padding: 48px; color: var(--ink3); }
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--ink3); background: var(--surface);
    }
    .pagination-btns { display: flex; gap: 6px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-eyebrow">Pannello di controllo</div>
    <div class="login-title">Accesso <em>Admin</em></div>
    <label for="admin-pass">Password</label>
    <input type="password" id="admin-pass" placeholder="••••••••" />
    <button class="btn btn-primary" id="loginBtn">Entra →</button>
    <div class="login-err" id="login-err">Password errata. Riprova.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-title">tim<em>bratura</em></div>
      <div class="topbar-badge">Admin</div>
    </div>
    <div class="topbar-right">
      <span class="live-dot">Live</span>
      <span class="topbar-clock" id="top-clock">—</span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Esci</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Totale animatori</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Dentro ora</div><div class="stat-value green" id="stat-in">—</div></div>
      <div class="stat-card"><div class="stat-label">Fuori ora</div><div class="stat-value red" id="stat-out">—</div></div>
    </div>

    <div class="section-header">
      <div class="section-title">Controllo accessi (Locks)</div>
    </div>
    <div class="control-row">
      <button id="toggle-in-btn" class="btn-toggle">Ingressi: Caricamento...</button>
      <button id="toggle-out-btn" class="btn-toggle">Uscite: Caricamento...</button>
    </div>

    <div class="section-header">
      <div class="section-title">Stato animatori</div>
      <button class="btn btn-sm btn-ghost" id="refreshBtn">↻ Aggiorna</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="filter-name" placeholder="Cerca nome o anno…">
      <select id="filter-status">
        <option value="">Tutti gli stati</option>
        <option value="inside">Dentro</option>
        <option value="outside">Fuori</option>
      </select>
      <select id="filter-sort">
        <option value="status">Ordina per: Stato</option>
        <option value="alpha">Ordina per: Alfabetico</option>
        <option value="anno">Ordina per: Anno</option>
      </select>
    </div>

    <div class="status-grid" id="animators-grid">
      <div class="empty">⏳ Caricamento…</div>
    </div>

    <div class="section-header">
      <div class="section-title">Log timbrature</div>
    </div>

    <div class="filter-bar">
      <input type="text" id="log-search" placeholder="Cerca nome…">
      <input type="date" id="log-date">
      <select id="log-tipo">
        <option value="">Tutti</option>
        <option value="Ingresso">Ingresso</option>
        <option value="Uscita">Uscita</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Nome</th><th>Anno</th><th>Data</th><th>Ora</th><th>Tipo</th><th>Azioni</th></tr></thead>
        <tbody id="log-tbody"><tr><td colspan="6" class="empty">⏳ Caricamento…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-manual">
  <div class="modal">
    <div class="modal-title">Timbratura manuale</div>
    <p style="font-size:12px;color:var(--ink3);margin-bottom:20px;">Registra per <strong id="manual-name-label">—</strong></p>
    <select id="manual-tipo"><option value="Ingresso">Ingresso</option><option value="Uscita">Uscita</option></select>
    <input type="date" id="manual-data" />
    <input type="time" id="manual-ora" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="closeManualBtn">Annulla</button>
      <button class="btn btn-primary" id="saveManualBtn">Salva</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-edit-profile">
  <div class="modal">
    <div class="modal-title">Modifica Anagrafica</div>
    <input type="hidden" id="profile-old-nome" />
    <input type="hidden" id="profile-old-anno" />
    <input type="text" id="profile-new-nome" placeholder="Nuovo nome" />
    <input type="number" id="profile-new-anno" placeholder="Nuovo anno" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="closeProfileBtn">Annulla</button>
      <button class="btn btn-amber" id="saveProfileBtn">Salva</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  (function() {
    // CONFIGURAZIONE
    const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
    const ADMIN_PASSWORD = 'admin123';

    let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let allAnimators = [];
    let allLog = [];
    let ingressoAperto = true;
    let uscitaAperta = true;
    let manualTarget = null;

    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    function closeAllModals() {
      document.getElementById('modal-manual').classList.remove('open');
      document.getElementById('modal-edit-profile').classList.remove('open');
    }

    // LOGIN
    document.getElementById('loginBtn').onclick = async () => {
      const pw = document.getElementById('admin-pass').value;
      if (pw !== ADMIN_PASSWORD) {
        document.getElementById('login-err').style.display = 'block';
        return;
      }
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      sessionStorage.setItem('admin_auth', '1');
      await loadAllData();
      startClock();
    };

    document.getElementById('admin-pass').onkeypress = (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    };

    document.getElementById('logoutBtn').onclick = () => {
      sessionStorage.removeItem('admin_auth');
      location.reload();
    };

    async function loadAllData() {
      await loadSettings();
      await loadUsers();
      await loadTimbrature();
      renderAnimators();
      renderLog();
      updateStats();
    }

    async function loadSettings() {
      const { data } = await supabase.from('impostazioni').select('*');
      if (data) {
        data.forEach(row => {
          if (row.chiave === 'ingresso_aperto') ingressoAperto = row.valore;
          if (row.chiave === 'uscita_aperta') uscitaAperta = row.valore;
        });
      }
      const btnIn = document.getElementById('toggle-in-btn');
      const btnOut = document.getElementById('toggle-out-btn');
      btnIn.textContent = ingressoAperto ? '🔓 INGRESSI: ATTIVI' : '🔒 INGRESSI: BLOCCATI';
      btnOut.textContent = uscitaAperta ? '🔓 USCITE: ATTIVE' : '🔒 USCITE: BLOCCATE';
    }

    async function loadUsers() {
      const { data } = await supabase.from('utenti').select('nome, anno');
      allAnimators = data || [];
    }

    async function loadTimbrature() {
      const { data } = await supabase.from('timbrature').select('*').order('created_at', { ascending: false });
      allLog = data || [];
    }

    function renderAnimators() {
      const search = document.getElementById('filter-name').value.toLowerCase();
      const statusFilter = document.getElementById('filter-status').value;
      const sortBy = document.getElementById('filter-sort').value;

      // Calcola ultima timbratura per ogni animatore
      const lastStampMap = {};
      for (const log of allLog) {
        const key = log.nome;
        if (!lastStampMap[key]) lastStampMap[key] = log;
      }

      let list = allAnimators.map(a => ({
        nome: a.nome,
        anno: a.anno,
        lastStamp: lastStampMap[a.nome] || null,
        isInside: lastStampMap[a.nome]?.tipo === 'Ingresso' || false
      }));

      if (search) list = list.filter(a => a.nome.toLowerCase().includes(search) || String(a.anno).includes(search));
      if (statusFilter === 'inside') list = list.filter(a => a.isInside);
      if (statusFilter === 'outside') list = list.filter(a => !a.isInside);

      if (sortBy === 'status') list.sort((a, b) => (b.isInside ? 1 : 0) - (a.isInside ? 1 : 0));
      else if (sortBy === 'alpha') list.sort((a, b) => a.nome.localeCompare(b.nome));
      else if (sortBy === 'anno') list.sort((a, b) => (parseInt(a.anno) || 0) - (parseInt(b.anno) || 0));

      const grid = document.getElementById('animators-grid');
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty">👤 Nessun animatore trovato</div>';
        return;
      }

      grid.innerHTML = list.map(a => `
        <div class="animator-card ${a.isInside ? 'inside' : 'outside'}">
          <div class="anim-name">${escapeHtml(a.nome)} <span>(${a.anno || '—'})</span></div>
          <div class="anim-status ${a.isInside ? 'in' : 'out'}">${a.isInside ? 'Dentro' : 'Fuori'}</div>
          <div class="anim-last">${a.lastStamp ? `${a.lastStamp.tipo} — ${a.lastStamp.data} ${a.lastStamp.ora}` : 'Nessuna timbratura'}</div>
          <div class="anim-actions">
            <button class="btn btn-green btn-sm" onclick="window.manualTimbratura('${escapeHtml(a.nome)}', '${a.anno || ''}', 'Ingresso')">⬆ In</button>
            <button class="btn btn-red btn-sm" onclick="window.manualTimbratura('${escapeHtml(a.nome)}', '${a.anno || ''}', 'Uscita')">⬇ Out</button>
            <button class="btn btn-amber btn-sm" onclick="window.editAnagrafica('${escapeHtml(a.nome)}', '${a.anno || ''}')">✎ Modifica</button>
          </div>
        </div>
      `).join('');
    }

    function renderLog() {
      const search = document.getElementById('log-search').value.toLowerCase();
      const date = document.getElementById('log-date').value;
      const tipo = document.getElementById('log-tipo').value;

      let filtered = allLog.filter(l => {
        if (search && !l.nome.toLowerCase().includes(search)) return false;
        if (tipo && l.tipo !== tipo) return false;
        if (date) {
          const parts = l.data.split('/');
          const logDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
          if (logDate !== date) return false;
        }
        return true;
      });

      const tbody = document.getElementById('log-tbody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">📋 Nessuna timbratura</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(l => `
        <tr>
          <td><strong>${escapeHtml(l.nome)}</strong></td>
          <td>${l.anno || '—'}</td>
          <td>${l.data}</td>
          <td>${l.ora}</td>
          <td><span class="tipo-badge ${l.tipo === 'Ingresso' ? 'ingresso' : 'uscita'}">${l.tipo}</span></td>
          <td><button class="btn btn-red btn-sm" onclick="window.eliminaTimbratura(${l.id})">🗑️ Elimina</button></td>
        </tr>
      `).join('');
    }

    function updateStats() {
      const lastStampMap = {};
      for (const log of allLog) {
        const key = log.nome;
        if (!lastStampMap[key]) lastStampMap[key] = log;
      }
      const inside = allAnimators.filter(a => lastStampMap[a.nome]?.tipo === 'Ingresso').length;
      document.getElementById('stat-total').textContent = allAnimators.length;
      document.getElementById('stat-in').textContent = inside;
      document.getElementById('stat-out').textContent = allAnimators.length - inside;
    }
