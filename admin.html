<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ... (stesso CSS del file precedente, per brevità lo tralascio ma va incluso tutto) ... */
    /* Per risparmiare spazio, ti invito a prendere il CSS dal messaggio precedente */
  </style>
</head>
<body>
<!-- stesso HTML del precedente, includi tutti i div e modali -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  const SB_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const ADMIN_PASSWORD = 'admin123';
  const sb = window.supabase.createClient(SB_URL, SB_KEY);
  const GIORNI_TUTTI = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì'];

  let allAnimators = [], allLog = [], ingressoAperto = true, uscitaAperta = true, manualTarget = null;

  function toast(msg, type) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast ' + (type || '') + ' show'; setTimeout(() => el.classList.remove('show'), 3000); }
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>"']/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]; }); }
  function closeAllModals() { document.getElementById('modal-manual').classList.remove('open'); document.getElementById('modal-edit-profile').classList.remove('open'); document.getElementById('modal-settimana').classList.remove('open'); }

  // LOGIN e altre funzioni (identiche a prima)...
  // ... (inserisci qui tutte le funzioni che avevi: loadSettings, upsertImpostazione, loadUsers, renderAnimators, renderLog, updateStats, timbratura manuale, ecc.) ...
  // Per brevità, ti invito a copiare le funzioni dal file admin corretto precedente (quello senza errori) e aggiungi solo le modifiche sotto.
  
  // Funzioni aggiustate per gestire array/stringa in giorni_attivi
  function parseGiorniAttivi(giorni) {
    if (!giorni) return GIORNI_TUTTI;
    let giorniStr = '';
    if (Array.isArray(giorni)) giorniStr = giorni.join(',');
    else giorniStr = String(giorni);
    if (!giorniStr.trim()) return GIORNI_TUTTI;
    return giorniStr.split(',').map(g => g.trim()).filter(g => GIORNI_TUTTI.includes(g));
  }

  async function loadSettimane() {
    const { data } = await sb.from('settimane').select('*').order('id');
    const container = document.getElementById('settimane-list');
    if (!data || data.length === 0) { container.innerHTML = '<div class="empty">Nessuna settimana.</div>'; return; }
    container.innerHTML = data.map(s => {
      let giorniAttiviStr = '';
      if (Array.isArray(s.giorni_attivi)) {
        giorniAttiviStr = s.giorni_attivi.join(', ');
      } else if (typeof s.giorni_attivi === 'string') {
        giorniAttiviStr = s.giorni_attivi;
      } else if (s.giorni_attivi !== null && s.giorni_attivi !== undefined) {
        giorniAttiviStr = String(s.giorni_attivi);
      }
      const giorniMostrati = parseGiorniAttivi(giorniAttiviStr);
      return `<div class="sett-card"><div class="sett-info"><div class="sett-nome-admin">${escapeHtml(s.nome)}</div><div class="sett-date-admin">${escapeHtml(s.date_info||'')}</div><div class="sett-date-admin" style="font-size:10px;">Giorni: ${giorniMostrati.join(', ')}</div></div><div class="sett-actions"><button class="btn btn-amber btn-sm" onclick="editSettimana(${s.id}, '${escapeHtml(s.nome)}', '${escapeHtml(s.date_info||'')}', '${escapeHtml(giorniAttiviStr)}')">✏️ Modifica</button><button class="btn btn-red btn-sm" onclick="deleteSettimana(${s.id})">🗑️</button></div></div>`;
    }).join('');
  }

  window.editSettimana = (id, nome, dateInfo, giorniAttivi) => {
    document.getElementById('sett-id').value = id;
    document.getElementById('sett-nome').value = nome;
    document.getElementById('sett-date-info').value = dateInfo;
    document.getElementById('sett-giorni').value = giorniAttivi;
    document.getElementById('modal-settimana').classList.add('open');
  };
  document.getElementById('closeSettBtn').onclick = () => document.getElementById('modal-settimana').classList.remove('open');
  document.getElementById('saveSettBtn').onclick = async () => {
    const id = document.getElementById('sett-id').value;
    const nome = document.getElementById('sett-nome').value.trim();
    const dateInfo = document.getElementById('sett-date-info').value.trim();
    const giorniAttivi = document.getElementById('sett-giorni').value.trim();
    if (!nome) return toast('Il nome è obbligatorio','error');
    const payload = { nome, date_info: dateInfo, giorni_attivi: giorniAttivi };
    let error;
    if (id) error = (await sb.from('settimane').update(payload).eq('id', id)).error;
    else error = (await sb.from('settimane').insert(payload)).error;
    if (error) toast('Errore: '+error.message,'error');
    else { toast('Salvato','success'); document.getElementById('modal-settimana').classList.remove('open'); await loadSettimane(); await loadDispRiepilogo(); }
  };
  document.getElementById('add-sett-btn').onclick = () => editSettimana(0, '', '', '');
  window.deleteSettimana = async (id) => { if (!confirm('Eliminare?')) return; await sb.from('settimane').delete().eq('id', id); await sb.from('disponibilita').delete().eq('settimana_id', id); toast('Eliminata','success'); await loadSettimane(); await loadDispRiepilogo(); };

  async function loadDispRiepilogo() {
    const { data: settimane } = await sb.from('settimane').select('*').order('id');
    const { data: dispo } = await sb.from('disponibilita').select('*');
    const { data: utenti } = await sb.from('utenti').select('id, nome, anno').order('nome');
    const container = document.getElementById('admin-disp-container');
    if (!settimane || settimane.length === 0) { container.innerHTML = '<div class="empty">Nessuna settimana.</div>'; return; }
    let html = '';
    for (const s of settimane) {
      const giorniAttivi = parseGiorniAttivi(s.giorni_attivi);
      const map = new Map();
      if (dispo) dispo.filter(d => d.settimana_id === s.id).forEach(d => {
        const idx = giorniAttivi.indexOf(GIORNI_TUTTI[d.giorno_index]);
        if (idx === -1) return;
        if (!map.has(d.user_id)) map.set(d.user_id, Array(giorniAttivi.length).fill(''));
        const arr = map.get(d.user_id);
        let simbolo = '';
        if (d.stato === 'disponibile') simbolo = '<span class="disp-si">✅ Sì</span>';
        else if (d.stato === 'non_disponibile') simbolo = '<span class="disp-no">❌ No</span>';
        arr[idx] = simbolo;
      });
      html += `<div class="disp-block"><div class="disp-block-title">📅 ${escapeHtml(s.nome)}</div><div class="disp-block-date">${escapeHtml(s.date_info||'')}</div><div style="overflow-x:auto;"><table class="disp-table"><thead><tr><th>Animatore</th>${giorniAttivi.map(g=>`<th>${g}</th>`).join('')}</tr></thead><tbody>`;
      for (const u of utenti) {
        const scelte = map.get(u.id) || Array(giorniAttivi.length).fill('');
        html += `<tr><td><strong>${escapeHtml(u.nome)}</strong> ${u.anno?'('+u.anno+')':''}</td>${scelte.map(c=>`<td>${c||'—'}</td>`).join('')}</tr>`;
      }
      html += `</tbody></table></div></div><div style="margin-bottom:40px;"></div>`;
    }
    container.innerHTML = html;
  }

  // Il resto delle funzioni (loadSettings, loadUsers, renderAnimators, ecc.) va aggiunto qui.
  // Assicurati di includere tutte le altre funzioni dal file precedente.
  // ...
})();
</script>
</body>
</html>
