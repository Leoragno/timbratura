<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login Animatori</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="auth-screen">
    <h2>Accesso Animatore</h2>
    <input type="text" id="nome" placeholder="Nome e Cognome">
    <input type="password" id="pass" placeholder="Password (PIN)">
    <button onclick="accedi()">ENTRA</button>
    <button onclick="registra()">REGISTRATI</button>
  </div>

<script>
  const SB_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const supabase = window.supabase.createClient(SB_URL, SB_KEY);

  async function registra() {
    const nome = document.getElementById('nome').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if (!nome || !pass) { alert("Inserisci nome e password"); return; }
    
    const { error } = await supabase.from('utenti').insert([{
      nome,
      password: pass,
      privacy_accepted: true,
      privacy_accepted_at: new Date().toISOString(),
      privacy_version: '1.0'
    }]);
    if (error) alert("Errore: " + error.message);
    else alert("Registrato con successo! Ora puoi entrare.");
  }

  async function accedi() {
    const nome = document.getElementById('nome').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if (!nome || !pass) { alert("Inserisci nome e password"); return; }

    const { data, error } = await supabase
      .from('utenti')
      .select('*')
      .eq('nome', nome)
      .eq('password', pass)
      .maybeSingle();

    if (data) {
      localStorage.setItem('cu', JSON.stringify(data));
      window.location.href = 'timbratura.html';
    } else {
      alert("Credenziali errate.");
    }
  }
</script>
</body>
</html>
