<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login Animatori</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="auth-screen">
    <h2>Accesso Animatore</h2>
    <input type="text" id="nome" placeholder="Nome e Cognome">
    <input type="password" id="pass" placeholder="Password (PIN)">
    <button onclick="accedi()">ENTRA</button>
    <button onclick="registra()">REGISTRATI</button>
  </div>

<script>
  const supabase = window.supabase.createClient('TUA_URL_SUPABASE', 'TUA_ANON_KEY');

  async function registra() {
    const nome = document.getElementById('nome').value.trim();
    const pass = document.getElementById('pass').value.trim();
    
    // Inseriamo direttamente nel database senza auth
    const { error } = await supabase.from('utenti').insert([{ nome, password: pass }]);
    if (error) alert("Errore: " + error.message);
    else alert("Registrato con successo!");
  }

  async function accedi() {
    const nome = document.getElementById('nome').value.trim();
    const pass = document.getElementById('pass').value.trim();

    // Verifichiamo nel database
    const { data, error } = await supabase
      .from('utenti')
      .select('*')
      .eq('nome', nome)
      .eq('password', pass)
      .maybeSingle();

    if (data) {
      localStorage.setItem('animatore', JSON.stringify(data));
      window.location.href = 'timbratura.html';
    } else {
      alert("Credenziali errate.");
    }
  }
</script>
</body>
</html>
