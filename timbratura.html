<script>
  /* ════════════════════════════════════════════════════
   *  ⚙️ CONFIGURAZIONE SUPABASE
   * ════════════════════════════════════════════════════ */
  const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SUPABASE_ANON_KEY = 'LA_TUA_CHIAVE_SUPABASE';

  const TABLE = 'timbrature';

  let supabaseClient = null;
  let currentUser = null;
  let clockInterval = null;

  /* ── Mostra/nasconde sezioni ── */
  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => {
      s.classList.remove('active');
    });

    document
      .getElementById('section-' + name)
      .classList.add('active');
  }

  /* ── Toast ── */
  function toast(msg, type = 'info', duration = 3500) {
    const el = document.getElementById('toast');

    el.textContent = msg;
    el.className = 'toast ' + type;
    el.classList.add('show');

    setTimeout(() => {
      el.classList.remove('show');
    }, duration);
  }

  /* ── Orologio live ── */
  function startClock() {
    function tick() {
      const now = new Date();

      document.getElementById('live-time').textContent =
        now.toLocaleTimeString('it-IT');

      document.getElementById('live-date').textContent =
        now.toLocaleDateString('it-IT', {
          weekday: 'short',
          day: '2-digit',
          month: 'long',
          year: 'numeric'
        });
    }

    tick();
    clockInterval = setInterval(tick, 1000);
  }

  /* ── Nome da email ── */
  function nameFromEmail(email) {
    const local = email.split('@')[0];

    return local
      .replace(/[._\-]/g, ' ')
      .split(' ')
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join(' ');
  }

  /* ── Carica ultima timbratura ── */
  async function loadLastStamp(userId) {
    const { data, error } = await supabaseClient
      .from(TABLE)
      .select('nome, data, ora, tipo')
      .eq('user_id', userId)
      .order('created_at', { ascending: false })
      .limit(1);

    if (error) {
      console.error(error);
      return;
    }

    if (data && data.length > 0) {
      const s = data[0];

      document.getElementById('last-stamp-text').textContent =
        `${s.tipo} — ${s.data} alle ${s.ora}`;

      document
        .getElementById('last-stamp-block')
        .classList.add('visible');
    }
  }

  /* ── Dashboard ── */
  async function showDashboard(user) {
    currentUser = user;

    const nome =
      user.user_metadata?.full_name ||
      nameFromEmail(user.email);

    document.getElementById('user-name').textContent = nome;

    showSection('dashboard');

    startClock();

    await loadLastStamp(user.id);
  }

  /* ── Inizializza app ── */
  async function initApp() {

    /* Controllo configurazione */
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      toast(
        '⚠️ Configura prima SUPABASE_URL e SUPABASE_ANON_KEY',
        'error',
        5000
      );
      return;
    }

    /* Crea client Supabase */
    supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    /* Sessione già esistente */
    const {
      data: { session }
    } = await supabaseClient.auth.getSession();

    if (session) {
      showDashboard(session.user);
    } else {
      showSection('login');
    }

    /* Listener login/logout */
    supabaseClient.auth.onAuthStateChange(
      (_event, session) => {

        if (session) {
          showDashboard(session.user);
        } else {
          showSection('login');
        }
      }
    );
  }

  /* ── Invia magic link ── */
  async function sendMagicLink() {

    const email = document
      .getElementById('input-email')
      .value
      .trim();

    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      toast('Inserisci un\'email valida', 'error');
      return;
    }

    const btn = document.getElementById('btn-magic');

    btn.disabled = true;
    btn.textContent = 'Invio in corso…';

    const { error } =
      await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.href
        }
      });

    btn.disabled = false;
    btn.textContent = 'Invia Magic Link ✉️';

    if (error) {

      toast(
        'Errore: ' + error.message,
        'error'
      );

    } else {

      document.getElementById('sent-email')
        .textContent = email;

      showSection('sent');
    }
  }

  /* ── Registra timbratura ── */
  async function stamp(tipo) {

    if (!currentUser) return;

    const btnEnter = document.getElementById('btn-enter');
    const btnExit  = document.getElementById('btn-exit');

    btnEnter.disabled = true;
    btnExit.disabled  = true;

    const now = new Date();

    const nome =
      currentUser.user_metadata?.full_name ||
      nameFromEmail(currentUser.email);

    const data = now.toLocaleDateString('it-IT');
    const ora  = now.toLocaleTimeString('it-IT');

    const { error } = await supabaseClient
      .from(TABLE)
      .insert({
        user_id: currentUser.id,
        nome,
        data,
        ora,
        tipo
      });

    btnEnter.disabled = false;
    btnExit.disabled  = false;

    if (error) {

      toast(
        'Errore: ' + error.message,
        'error'
      );

    } else {

      toast(
        tipo === 'Ingresso'
          ? '⬆ Ingresso registrato'
          : '⬇ Uscita registrata',
        'success'
      );

      document.getElementById('last-stamp-text')
        .textContent =
        `${tipo} — ${data} alle ${ora}`;

      document
        .getElementById('last-stamp-block')
        .classList.add('visible');
    }
  }

  /* ── Logout ── */
  async function logout() {

    await supabaseClient.auth.signOut();

    currentUser = null;

    clearInterval(clockInterval);

    showSection('login');

    toast('Disconnesso', 'info');
  }

  /* ── Auto avvio ── */
  window.addEventListener('load', () => {

    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
      initApp();
    }

  });
</script>
