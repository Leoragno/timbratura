<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timbratura Animatori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb;
      --surface: #ffffff;
      --border: #d8d2c4;
      --ink: #1a1714;
      --ink3: #8a7f72;
      --accent: #2d4a3e;
      --accent-lt: #e8f0ec;
      --red: #8b2e2e;
      --red-lt: #f5e8e8;
      --green: #2d5a3d;
      --green-lt: #e5f2ea;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'Geist Mono', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-mono); font-size: 13px; -webkit-font-smoothing: antialiased; }
    #app-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 44px 40px; box-shadow: 0 2px 24px rgba(0,0,0,.07); }
    .title { font-family: var(--font-serif); font-size: 32px; line-height: 1.1; margin-bottom: 24px; }
    .title em { font-style: italic; color: var(--accent); }
    label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
    input[type="email"], input[type="text"], input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 11px 13px; font-family: var(--font-mono); font-size: 13px; color: var(--ink); outline: none; margin-bottom: 16px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px; border: 1px solid transparent; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1f3329; }
    .btn-big { font-family: var(--font-serif); font-size: 28px; font-style: italic; padding: 24px; margin-bottom: 16px; }
    .btn-inside { background: var(--green); color: white; }
    .btn-outside { background: var(--red); color: white; }
    .status-banner { text-align: center; padding: 12px; border-radius: 3px; margin-bottom: 20px; font-weight: 500; }
    .status-banner.inside { background: var(--green-lt); color: var(--green); }
    .status-banner.outside { background: var(--red-lt); color: var(--red); }
    .logout-link { display: block; text-align: center; color: var(--ink3); text-decoration: none; margin-top: 16px; font-size: 11px; }
    .logout-link:hover { color: var(--ink); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--bg); border-radius: 4px; padding: 12px 18px; font-size: 12px; opacity: 0; transition: all .3s ease; z-index: 100; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="app-container">
  <div id="screen-auth" class="card">
    <div class="title">tim<em>bratura</em></div>
    <p style="color:var(--ink3); margin-bottom:20px;">Inserisci il codice di accesso per timbrare.</p>
    <label for="passcode">Codice Accesso</label>
    <input type="password" id="passcode" placeholder="Inserisci il codice..." onkeydown="if(event.key==='Enter') loginRapido()" />
    <button class="btn btn-primary" onclick="loginRapido()">Accedi →</button>
  </div>

  <div id="screen-profile" class="card hidden">
    <div class="title">Chi <em>sei?</em></div>
    <p style="color:var(--ink3); margin-bottom:20px;">Inserisci il tuo nome e cognome per registrarti nel sistema delle timbrature.</p>
    <label for="display-name">Nome e Cognome</label>
    <input type="text" id="display-name" placeholder="Mario Rossi" />
    <button class="btn btn-primary" onclick="saveProfile()">Salva e Continua</button>
  </div>

  <div id="screen-action" class="card hidden">
    <div class="title">Ciao, <em id="user-greeting">Animatore</em></div>
    <div id="status-box" class="status-banner outside">Sei fuori servizio</div>
    
    <button id="stamp-btn" class="btn btn-big btn-inside" onclick="toggleStamp()">Entra in Servizio</button>
    
    <p style="text-align:center; color:var(--ink3); font-size:11px;" id="last-stamp-info">Nessuna timbratura oggi</p>
    <a href="#" class="logout-link" onclick="handleLogout(event)">Esci</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const TABLE = 'timbrature';
  const CODICE_ACCESSO = '1234'; // Puoi cambiare questo codice con quello che preferisci

  let supabaseClient = null;
  let simulatedUserId = null;
  let userProfileName = '';
  let isCurrentlyInside = false;

  window.addEventListener('load', () => {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Controlla se c'è già una sessione attiva salvata nel browser
    const savedId = localStorage.getItem('animatore_id');
    const savedName = localStorage.getItem('animatore_nome');
    if (savedId && savedName) {
      simulatedUserId = savedId;
      userProfileName = savedName;
      document.getElementById('user-greeting').textContent = userProfileName;
      checkCurrentStatus();
    } else {
      showScreen('screen-auth');
    }
  });

  function loginRapido() {
    const code = document.getElementById('passcode').value.trim();
    if (code !== CODICE_ACCESSO) {
      showToast('❌ Codice errato!');
      document.getElementById('passcode').value = '';
      return;
    }
    
    // Genera un ID temporaneo se non esiste, o lo chiede dopo
    showScreen('screen-profile');
  }

  async function saveProfile() {
    const name = document.getElementById('display-name').value.trim();
    if (!name) { showToast('Inserisci il tuo nome e cognome'); return; }
    
    userProfileName = name;
    // Creiamo un ID fisso basato sul nome per riconoscere l'utente nei prossimi accessi
    simulatedUserId = 'user_' + btoa(unescape(encodeURIComponent(name))).substring(0, 15);
    
    localStorage.setItem('animatore_id', simulatedUserId);
    localStorage.setItem('animatore_nome', userProfileName);
    
    document.getElementById('user-greeting').textContent = userProfileName;
    await checkCurrentStatus();
  }

  async function checkCurrentStatus() {
    // Recupera l'ultimo movimento per questo utente
    const { data, error } = await supabaseClient
      .from(TABLE)
      .select('tipo, data, ora')
      .eq('user_id', simulatedUserId)
      .order('created_at', { ascending: false })
      .limit(1);

    if (error) { showToast('Errore di sincronizzazione'); return; }

    if (data && data.length > 0) {
      isCurrentlyInside = (data[0].tipo === 'Ingresso');
      updateUIStatus(data[0]);
    } else {
      isCurrentlyInside = false;
      updateUIStatus(null);
    }
    showScreen('screen-action');
  }

  async function toggleStamp() {
    const nuovoTipo = isCurrentlyInside ? 'Uscita' : 'Ingresso';
    const oraAttuale = new Date();
    
    const dataStr = oraAttuale.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const oraStr = oraAttuale.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

    const { error } = await supabaseClient.from(TABLE).insert({
      user_id: simulatedUserId,
      nome: userProfileName,
      data: dataStr,
      ora: oraStr,
      tipo: nuovoTipo
    });

    if (error) {
      showToast('Errore durante la timbratura: ' + error.message);
    } else {
      isCurrentlyInside = !isCurrentlyInside;
      const fintaRow = { tipo: nuovoTipo, data: dataStr, ora: oraStr };
      updateUIStatus(fintaRow);
      showToast('Timbratura salvata: ' + nuovoTipo);
    }
  }

  function updateUIStatus(lastRow) {
    const statusBox = document.getElementById('status-box');
    const stampBtn = document.getElementById('stamp-btn');
    const infoText = document.getElementById('last-stamp-info');

    if (isCurrentlyInside) {
      statusBox.className = "status-banner inside";
      statusBox.textContent = "Sei in servizio";
      stampBtn.className = "btn btn-big btn-outside";
      stampBtn.textContent = "Esci dal Servizio";
    } else {
      statusBox.className = "status-banner outside";
      statusBox.textContent = "Sei fuori servizio";
      stampBtn.className = "btn btn-big btn-inside";
      stampBtn.textContent = "Entra in Servizio";
    }

    if (lastRow && lastRow.ora) {
      infoText.textContent = `Ultimo movimento: ${lastRow.tipo} alle ore ${lastRow.ora} (${lastRow.data})`;
    } else {
      infoText.textContent = "Nessuna timbratura registrata";
    }
  }

  function handleLogout(e) {
    e.preventDefault();
    localStorage.clear();
    location.reload();
  }

  function showScreen(screenId) {
    document.getElementById('screen-auth').classList.add('hidden');
    document.getElementById('screen-profile').classList.add('hidden');
    document.getElementById('screen-action').classList.add('hidden');
    document.getElementById(screenId).classList.remove('hidden');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
