<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login Animatori - Oratorio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
    button { background: #2d4a3e; color: white; border: none; cursor: pointer; }
    .error { color: red; font-size: 12px; }
  </style>
</head>
<body>
  <h2>🏠 Oratorio - Accesso Animatori</h2>
  <div id="login-box">
    <input type="text" id="nome" placeholder="Nome e Cognome" autocomplete="off">
    <input type="password" id="pass" placeholder="Password (PIN)">
    <button onclick="accedi()">🔐 ENTRA</button>
    <button onclick="mostraRegistrazione()">📝 REGISTRATI</button>
    <div id="messaggio" class="error"></div>
  </div>

  <div id="registra-box" style="display:none">
    <input type="text" id="reg-nome" placeholder="Nome e Cognome">
    <input type="number" id="reg-anno" placeholder="Anno di nascita (es. 2008)">
    <input type="email" id="reg-email" placeholder="Email (opzionale)">
    <input type="password" id="reg-pass" placeholder="Password">
    <button onclick="registra()">✅ CONFERMA REGISTRAZIONE</button>
    <button onclick="mostraLogin()">← TORNA AL LOGIN</button>
    <div id="reg-messaggio" class="error"></div>
  </div>

  <script>
    // SUPABASE CONFIG - INSERISCI I TUOI DATI
    const SUPABASE_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // TABELLA utenti: deve avere colonne (id, nome, anno, email, password, created_at)
    
    async function registra() {
      const nome = document.getElementById('reg-nome').value.trim();
      const anno = parseInt(document.getElementById('reg-anno').value);
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-pass').value;
      
      if (!nome || !anno || !password) {
        alert("Compila tutti i campi obbligatori (nome, anno, password)");
        return;
      }
      
      // REGISTRAZIONE DIRETTA NEL DATABASE (SENZA AUTH EMAIL)
      const { data, error } = await supabase
        .from('utenti')
        .insert([{
          nome: nome,
          anno: anno,
          email: email || null,
          password: password, // ATTENZIONE: in produzione usa hash!
          created_at: new Date()
        }])
        .select();
      
      if (error) {
        if (error.code === '23505') {
          document.getElementById('reg-messaggio').innerText = '❌ Questo nome utente esiste già!';
        } else {
          document.getElementById('reg-messaggio').innerText = '❌ Errore: ' + error.message;
        }
      } else {
        alert('✅ Registrazione riuscita! Ora puoi accedere.');
        mostraLogin();
        // Pulisci campi
        document.getElementById('reg-nome').value = '';
        document.getElementById('reg-anno').value = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-pass').value = '';
      }
    }
    
    async function accedi() {
      const nome = document.getElementById('nome').value.trim();
      const password = document.getElementById('pass').value;
      
      if (!nome || !password) {
        document.getElementById('messaggio').innerText = 'Inserisci nome e password';
        return;
      }
      
      // VERIFICA NEL DATABASE
      const { data, error } = await supabase
        .from('utenti')
        .select('*')
        .eq('nome', nome)
        .eq('password', password)
        .maybeSingle();
      
      if (data) {
        localStorage.setItem('animatore', JSON.stringify({
          id: data.id,
          nome: data.nome,
          anno: data.anno
        }));
        alert(`👋 Benvenuto ${data.nome}!`);
        // Reindirizza alla pagina di timbratura
        window.location.href = 'timbratura.html'; // Cambia col nome del tuo file
      } else {
        document.getElementById('messaggio').innerText = '❌ Credenziali errate. Riprova o registrati.';
      }
    }
    
    function mostraRegistrazione() {
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('registra-box').style.display = 'block';
    }
    
    function mostraLogin() {
      document.getElementById('registra-box').style.display = 'none';
      document.getElementById('login-box').style.display = 'block';
      document.getElementById('messaggio').innerText = '';
      document.getElementById('reg-messaggio').innerText = '';
    }
  </script>
</body>
</html>
