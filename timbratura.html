<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Oratorio Timbratura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Stesso CSS del timbratura originale, identico a quello che hai già funzionante */
    /* Per brevità, includi il CSS dal file timbratura che usavi prima (quello senza errori) */
    /* Se vuoi, te lo re-invio ma è uguale a quello del messaggio precedente (la versione con Sì/No) */
    /* Per non appesantire, prendi lo stile dal tuo timbratura funzionante, oppure copialo dal file admin qui sopra (le parti comuni) */
  </style>
</head>
<body>
<!-- stesso HTML del timbratura originale, ma con la logica aggiornata per leggere giorni_attivi -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  const SB_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const sb = window.supabase.createClient(SB_URL, SB_KEY);
  let currentUser = null;
  let settimane = [];
  const GIORNI_TUTTI = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì'];

  let ingressoAperto = true, uscitaAperta = true, geoAbilitata = true, oratorioLat = 45.706869, oratorioLon = 8.800464, maxDistanza = 150, stampBusy = false;

  function toast(m, t) { const el = document.getElementById('toast'); el.textContent = m; el.className = 'toast ' + (t || '') + ' show'; setTimeout(() => el.classList.remove('show'), 3000); }
  function esc(s) { return s ? String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) : ''; }
  function distance(lat1, lon1, lat2, lon2) { const R = 6371000; const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180; const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }

  async function caricaImpostazioni() {
    const { data } = await sb.from('impostazioni').select('*');
    if (data) data.forEach(row => { if (row.chiave === 'ingresso_aperto') ingressoAperto = row.valore === true || row.valore === 'true'; if (row.chiave === 'uscita_aperta') uscitaAperta = row.valore === true || row.valore === 'true'; if (row.chiave === 'geo_abilitata') geoAbilitata = row.valore === true || row.valore === 'true'; if (row.chiave === 'oratorio_lat') oratorioLat = parseFloat(row.valore) || oratorioLat; if (row.chiave === 'oratorio_lon') oratorioLon = parseFloat(row.valore) || oratorioLon; if (row.chiave === 'max_distanza') maxDistanza = parseInt(row.valore) || maxDistanza; });
    const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out');
    if (btnIn) btnIn.disabled = !ingressoAperto;
    if (btnOut) btnOut.disabled = !uscitaAperta;
    const banner = document.getElementById('geo-banner');
    if (banner) banner.style.display = geoAbilitata ? 'block' : 'none';
  }

  async function timbra(tipo) {
    if (!currentUser) { toast('Devi effettuare il login', 'error'); return; }
    if (stampBusy) { toast('Attendi...', 'info'); return; }
    if (tipo === 'Ingresso' && !ingressoAperto) { toast('❌ Ingresso bloccato', 'error'); return; }
    if (tipo === 'Uscita' && !uscitaAperta) { toast('❌ Uscita bloccata', 'error'); return; }
    stampBusy = true;
    const btn = document.getElementById(tipo === 'Ingresso' ? 'btn-in' : 'btn-out');
    if (btn) btn.disabled = true;
    if (!geoAbilitata) { await salvaTimbratura(tipo); stampBusy = false; if (btn) btn.disabled = false; return; }
    if (!navigator.geolocation) { toast('Geolocalizzazione non supportata', 'error'); stampBusy = false; if (btn) btn.disabled = false; return; }
    const banner = document.getElementById('geo-banner'), debugDiv = document.getElementById('gps-debug');
    if (banner) banner.style.display = 'block';
    if (debugDiv) debugDiv.style.display = 'block';
    toast('📍 Acquisizione posizione...', 'info');
    navigator.geolocation.getCurrentPosition(async (position) => {
      const lat = position.coords.latitude, lon = position.coords.longitude, dist = distance(lat, lon, oratorioLat, oratorioLon);
      if (debugDiv) debugDiv.innerHTML = `📍 Distanza: ${Math.round(dist)}m (limite ${maxDistanza}m)`;
      if (dist > maxDistanza) { toast(`❌ Sei a ${Math.round(dist)}m dall'oratorio (max ${maxDistanza}m)`, 'error'); stampBusy = false; if (btn) btn.disabled = false; return; }
      await salvaTimbratura(tipo);
      stampBusy = false; if (btn) btn.disabled = false;
    }, (error) => { let msg = 'Errore GPS'; if (error.code === 1) msg = 'Permesso GPS negato'; else if (error.code === 2) msg = 'Posizione non disponibile'; else if (error.code === 3) msg = 'Timeout GPS'; toast(msg, 'error'); stampBusy = false; if (btn) btn.disabled = false; }, { enableHighAccuracy: true, timeout: 15000 });
  }

  async function salvaTimbratura(tipo) {
    const now = new Date();
    const data = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
    const ora = now.toTimeString().slice(0,5);
    const { error } = await sb.from('timbrature').insert({ user_id: currentUser.id, nome: currentUser.nome, anno: currentUser.anno || null, data, ora, tipo, created_at: now.toISOString() });
    if (error) toast(`Errore: ${error.message}`, 'error');
    else toast(`✅ ${tipo} alle ${ora}`, 'success');
    await caricaImpostazioni();
  }

  window.toggleAuth = (r) => { document.getElementById('login-card').style.display = r ? 'none' : 'block'; document.getElementById('register-card').style.display = r ? 'block' : 'none'; };
  document.getElementById('login-btn').onclick = async () => { const nome = document.getElementById('login-nome').value.trim(), pw = document.getElementById('login-password').value; if (!nome || !pw) { toast('Inserisci nome e password', 'error'); return; } const { data, error } = await sb.from('utenti').select('*').eq('nome', nome).eq('password', pw).maybeSingle(); if (error || !data) { toast('Accesso fallito', 'error'); return; } currentUser = data; sessionStorage.setItem('cu', JSON.stringify(data)); mostraApp(); };
  document.getElementById('register-btn').onclick = async () => { const nome = document.getElementById('reg-nome').value.trim(), anno = parseInt(document.getElementById('reg-anno').value), pw = document.getElementById('reg-password').value; if (!nome || !pw) { toast('Compila tutti i campi', 'error'); return; } if (pw.length < 4) { toast('Password min. 4 caratteri', 'error'); return; } const { data: exist } = await sb.from('utenti').select('nome').eq('nome', nome).maybeSingle(); if (exist) { toast('Nome già registrato', 'error'); return; } const { error } = await sb.from('utenti').insert([{ nome, password: pw, anno: anno || null }]); if (error) { toast('Errore registrazione', 'error'); return; } toast('Registrato! Ora accedi.', 'success'); toggleAuth(false); };
  document.getElementById('logout-btn').onclick = () => { sessionStorage.clear(); location.reload(); };

  async function mostraApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block'; document.getElementById('user-display-name').textContent = currentUser.nome; document.getElementById('topbar-user').textContent = currentUser.nome; document.getElementById('user-display-meta').textContent = 'Animatore - ' + (currentUser.anno || '?'); await caricaImpostazioni(); document.getElementById('btn-in').onclick = () => timbra('Ingresso'); document.getElementById('btn-out').onclick = () => timbra('Uscita'); }

  function parseGiorniAttivi(giorni) { if (!giorni) return GIORNI_TUTTI; if (typeof giorni === 'string') { if (!giorni.trim()) return GIORNI_TUTTI; return giorni.split(',').map(g=>g.trim()).filter(g=>GIORNI_TUTTI.includes(g)); } return GIORNI_TUTTI; }

  async function caricaSettimane() { let res = await sb.from('settimane').select('*').order('ordine', { ascending: true }); if (res.error) res = await sb.from('settimane').select('*').order('id', { ascending: true }); settimane = res.data || []; }

  async function caricaDisponibilita() {
    const container = document.getElementById('disp-container');
    container.innerHTML = '<div class="empty-state">⏳ Caricamento...</div>';
    await caricaSettimane();
    if (settimane.length === 0) { container.innerHTML = '<div class="empty-state">Nessuna settimana trovata.</div>'; return; }
    const { data: scelte } = await sb.from('disponibilita').select('*').eq('user_id', currentUser.id);
    const dispMap = {}; if (scelte) scelte.forEach(d => dispMap[d.settimana_id + '_' + d.giorno_index] = d);
    container.innerHTML = '';
    for (const s of settimane) {
      const giorniAttivi = parseGiorniAttivi(s.giorni_attivi);
      const block = document.createElement('div'); block.className = 'sett-block';
      block.innerHTML = `<div class="sett-header"><div class="sett-header-nome">${esc(s.nome)}</div><div class="sett-header-date">${esc(s.date_info || '')}</div></div><div class="giorni-grid" id="grid-${s.id}"></div><div class="sett-footer"><div class="sett-saved" id="saved-${s.id}">✓ Salvato</div><button class="btn-salva-sett" onclick="salvaSettimana(${s.id})">Salva Settimana</button></div>`;
      container.appendChild(block);
      const grid = document.getElementById(`grid-${s.id}`);
      for (let idx = 0; idx < giorniAttivi.length; idx++) {
        const giornoNome = giorniAttivi[idx];
        const giornoIndex = GIORNI_TUTTI.indexOf(giornoNome);
        const key = s.id + '_' + giornoIndex;
        const stato = dispMap[key] ? dispMap[key].stato : '';
        const row = document.createElement('div'); row.className = 'giorno-row';
        row.innerHTML = `<div class="giorno-label">${giornoNome}</div><div class="disp-btns" data-sett="${s.id}" data-idx="${giornoIndex}"><button class="disp-btn ${stato==='disponibile'?'sel-disp':''}" onclick="setStato(this, 'disponibile')">Sì</button><button class="disp-btn ${stato==='non_disponibile'?'sel-no':''}" onclick="setStato(this, 'non_disponibile')">No</button></div>`;
        grid.appendChild(row);
      }
    }
  }

  window.setStato = (btn, val) => { const parent = btn.parentElement; parent.querySelectorAll('.disp-btn').forEach(b => b.classList.remove('sel-disp', 'sel-no')); const cls = val === 'disponibile' ? 'sel-disp' : 'sel-no'; btn.classList.add(cls); parent.dataset.val = val; };
  window.salvaSettimana = async (settId) => { const rows = document.querySelectorAll(`.disp-btns[data-sett="${settId}"]`); for (const r of rows) { const stato = r.dataset.val; if (!stato) continue; const idx = r.dataset.idx; const { data: exist } = await sb.from('disponibilita').select('id').eq('user_id', currentUser.id).eq('settimana_id', settId).eq('giorno_index', idx).maybeSingle(); const payload = { user_id: currentUser.id, nome: currentUser.nome, settimana_id: settId, giorno_index: idx, stato }; if (exist) await sb.from('disponibilita').update(payload).eq('id', exist.id); else await sb.from('disponibilita').insert([payload]); } const saved = document.getElementById(`saved-${settId}`); if (saved) { saved.style.display = 'block'; setTimeout(() => saved.style.display = 'none', 2000); } toast('Disponibilità salvate!', 'success'); };

  document.querySelectorAll('.tab-btn').forEach(b => { b.onclick = () => { document.querySelectorAll('.tab-btn, .tab-panel').forEach(x => x.classList.remove('active')); b.classList.add('active'); const target = b.dataset.tab; document.getElementById(target).classList.add('active'); if (target === 'tab-disponibilita') caricaDisponibilita(); }; });

  const saved = sessionStorage.getItem('cu'); if (saved) { try { currentUser = JSON.parse(saved); mostraApp(); } catch(e) { sessionStorage.removeItem('cu'); } }
  const urlParams = new URLSearchParams(window.location.search); const qa = urlParams.get('qa'); if (qa && !currentUser) { sessionStorage.setItem('pqa', qa === 'in' ? 'Ingresso' : 'Uscita'); document.getElementById('qr-alert-login').style.display = 'block'; } else if (qa && currentUser) { setTimeout(() => timbra(qa === 'in' ? 'Ingresso' : 'Uscita'), 500); }
})();
</script>
</body>
</html>
