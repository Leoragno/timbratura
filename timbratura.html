<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Oratorio Timbratura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb; --surface: #fff; --border: #d8d2c4;
      --ink: #1a1714; --ink2: #5a5148; --ink3: #8a7f72;
      --accent: #2d4a3e; --accent-lt: #e8f0ec;
      --red: #8b2e2e; --red-lt: #f5e8e8;
      --amber: #7a5c1e; --amber-lt: #fdf3dc;
      --green: #2d5a3d; --green-lt: #e5f2ea;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'Geist Mono', 'Courier New', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-mono); font-size: 13px; -webkit-font-smoothing: antialiased; }

    /* AUTH */
    #auth-screen { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; background: var(--bg); }
    .auth-card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .auth-title { font-family: var(--font-serif); font-size: 32px; line-height: 1.1; margin-bottom: 24px; text-align: center; }
    .auth-title em { font-style: italic; color: var(--accent); }
    label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 11px 13px; font-family: var(--font-mono); font-size: 13px; color: var(--ink); outline: none; margin-bottom: 16px; }
    input:focus { border-color: var(--accent); }
    .btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px; border: 1px solid transparent; border-radius: 3px; font-family: var(--font-mono); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; margin-bottom: 12px; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-green { background: var(--green); color: #fff; font-size: 15px; padding: 18px; }
    .btn-red { background: var(--red); color: #fff; font-size: 15px; padding: 18px; }
    .auth-toggle { text-align: center; font-size: 12px; color: var(--ink2); cursor: pointer; margin-top: 8px; }
    .auth-toggle span { text-decoration: underline; color: var(--accent); }
    .error-msg { color: var(--red); font-size: 12px; text-align: center; margin-top: 8px; display: none; }
    .success-msg { color: var(--green); font-size: 12px; text-align: center; margin-top: 8px; display: none; }

    /* APP */
    #app-screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding-bottom: 60px; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
    .topbar-title { font-family: var(--font-serif); font-size: 19px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-user { font-size: 11px; color: var(--ink3); }

    /* TABS */
    .tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 13px 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: var(--ink3); transition: all .15s; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .main-panel { max-width: 540px; margin: 0 auto; padding: 20px 16px; }

    /* CARDS & DISPONIBILITÀ */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px 20px; margin-bottom: 16px; }
    .user-name { font-family: var(--font-serif); font-size: 26px; text-align: center; margin-bottom: 4px; }
    .user-meta { font-size: 11px; color: var(--ink3); text-align: center; margin-bottom: 20px; }
    .sett-block { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 14px; overflow: hidden; }
    .sett-header { background: var(--accent); color: #fff; padding: 12px 16px; }
    .sett-header-nome { font-family: var(--font-serif); font-size: 16px; }
    .sett-header-date { font-size: 10px; opacity: .8; }
    .giorni-grid { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .giorno-row { display: flex; align-items: center; gap: 8px; }
    .giorno-label { width: 100px; font-size: 11px; }
    .disp-btns { display: flex; gap: 5px; flex: 1; }
    .disp-btn { flex: 1; padding: 7px 4px; border: 1px solid var(--border); border-radius: 3px; font-size: 10px; font-family: var(--font-mono); cursor: pointer; background: var(--bg); color: var(--ink3); }
    .disp-btn.sel-disp { background: var(--green-lt); border-color: #b2d4bc; color: var(--green); }
    .disp-btn.sel-forse { background: var(--amber-lt); border-color: #e0cfa0; color: var(--amber); }
    .disp-btn.sel-no { background: var(--red-lt); border-color: #dbb2b2; color: var(--red); }
    .sett-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .btn-salva-sett { background: var(--accent); color: #fff; border: none; border-radius: 3px; padding: 8px 18px; font-size: 11px; cursor: pointer; }
    .sett-saved { font-size: 10px; color: var(--green); display: none; }

    /* MISC */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 12px 24px; border-radius: 4px; opacity: 0; transition: .3s; z-index: 500; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); }
    .toast.success { background: var(--green); }
    .gps-banner { display: none; background: #fffbe6; border: 1px solid #e0cfa0; padding: 12px; border-radius: 4px; font-size: 11px; margin-bottom: 14px; }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card" id="login-card">
    <div class="auth-title">Accedi all'<em>Oratorio</em></div>
    <div id="qr-alert-login" style="display:none; color:var(--accent); font-weight:bold; margin-bottom:10px; text-align:center;">📱 QR Code rilevato! Accedi.</div>
    <label>👤 Nome e Cognome</label>
    <input type="text" id="login-nome" placeholder="Mario Rossi" autocomplete="off" />
    <label>🔐 Password</label>
    <input type="password" id="login-password" />
    <div class="error-msg" id="login-error"></div>
    <button class="btn btn-primary" id="login-btn">Entra →</button>
    <div class="auth-toggle" onclick="toggleAuth(true)">Nuovo? <span>Registrati</span></div>
  </div>

  <div class="auth-card" id="register-card" style="display:none;">
    <div class="auth-title">Nuovo <em>Animatore</em></div>
    <label>📛 Nome e Cognome</label>
    <input type="text" id="reg-nome" />
    <label>🎂 Anno di Nascita</label>
    <input type="number" id="reg-anno" />
    <label>🔐 Password</label>
    <input type="password" id="reg-password" />
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>
    <button class="btn btn-primary" id="register-btn">Registrati</button>
    <div class="auth-toggle" onclick="toggleAuth(false)">Hai un account? <span>Accedi</span></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-title">tim<em>bratura</em></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-primary" id="logout-btn" style="padding: 4px 8px; font-size: 10px;">Esci</button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="tab-timbratura">⏱ Timbratura</button>
    <button class="tab-btn" data-tab="tab-disponibilita">📅 Disponibilità</button>
  </div>

  <div class="tab-panel active" id="tab-timbratura">
    <div class="main-panel">
      <div class="card">
        <div class="user-name" id="user-display-name">—</div>
        <div class="user-meta" id="user-display-meta">—</div>
        <div class="gps-banner" id="geo-banner">📍 Attiva il GPS per timbrare.</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <button class="btn btn-green" id="btn-in">⬆ INGRESSO</button>
          <button class="btn btn-red" id="btn-out">⬇ USCITA</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-disponibilita">
    <div class="main-panel">
      <div id="disp-container">
        <div class="empty-state" style="text-align:center; padding:40px;">⏳ Caricamento settimane...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  const SB_URL = 'https://bbwozrlingsbjcawtval.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid296cmxpbmdzYmpjYXd0dmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTQxMTYsImV4cCI6MjA5NTM3MDExNn0.oimZ43OiiVsB-twTbCjBHvNsY4Tq4pM6AhmNxkpcN-Y';
  const sb = window.supabase.createClient(SB_URL, SB_KEY);

  let currentUser = null;
  let settimane = [];
  const GIORNI = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì'];

  // --- UTILS ---
  function toast(m, t) {
    const el = document.getElementById('toast');
    el.textContent = m;
    el.className = 'toast ' + (t || '') + ' show';
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function esc(s) { return s ? String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) : ''; }

  // --- AUTH ---
  window.toggleAuth = (r) => {
    document.getElementById('login-card').style.display = r ? 'none' : 'block';
    document.getElementById('register-card').style.display = r ? 'block' : 'none';
  };

  document.getElementById('login-btn').onclick = async () => {
    const nome = document.getElementById('login-nome').value.trim();
    const pw = document.getElementById('login-password').value;
    const { data, error } = await sb.from('utenti').select('*').eq('nome', nome).eq('password', pw).maybeSingle();
    if (error || !data) return toast('Accesso fallito', 'error');
    currentUser = data;
    sessionStorage.setItem('cu', JSON.stringify(data));
    mostraApp();
  };

  document.getElementById('register-btn').onclick = async () => {
    const nome = document.getElementById('reg-nome').value.trim();
    const anno = parseInt(document.getElementById('reg-anno').value);
    const pw = document.getElementById('reg-password').value;
    if (!nome || !pw) return toast('Compila tutto', 'error');
    const { error } = await sb.from('utenti').insert([{ nome, password: pw, anno }]);
    if (error) return toast('Errore registrazione', 'error');
    toast('Registrato! Ora accedi.', 'success');
    toggleAuth(false);
  };

  document.getElementById('logout-btn').onclick = () => { sessionStorage.clear(); location.reload(); };

  // --- APP LOGIC ---
  async function mostraApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-display-name').textContent = currentUser.nome;
    document.getElementById('topbar-user').textContent = currentUser.nome;
    document.getElementById('user-display-meta').textContent = 'Animatore - ' + (currentUser.anno || '');
  }

  // --- DISPONIBILITÀ ---
  async function caricaSettimane() {
    // Prova ad ordinare per 'ordine', se fallisce usa 'id'
    let res = await sb.from('settimane').select('*').order('ordine', { ascending: true });
    if (res.error) res = await sb.from('settimane').select('*').order('id', { ascending: true });
    settimane = res.data || [];
  }

  async function caricaDisponibilita() {
    const container = document.getElementById('disp-container');
    container.innerHTML = '⏳ Caricamento...';
    
    await caricaSettimane();
    if (settimane.length === 0) {
      container.innerHTML = 'Nessuna settimana trovata.';
      return;
    }

    // Carica le scelte dell'utente (TABELLA SENZA ACCENTO)
    const { data: scelte } = await sb.from('disponibilita').select('*').eq('user_id', currentUser.id);
    const dispMap = {};
    if (scelte) scelte.forEach(d => dispMap[d.settimana_id + '_' + d.giorno_index] = d);

    container.innerHTML = '';
    settimane.forEach(s => {
      const block = document.createElement('div');
      block.className = 'sett-block';
      block.innerHTML = `
        <div class="sett-header">
          <div class="sett-header-nome">${esc(s.nome)}</div>
          <div class="sett-header-date">${esc(s.date_info || '')}</div>
        </div>
        <div class="giorni-grid" id="grid-${s.id}"></div>
        <div class="sett-footer">
          <div class="sett-saved" id="saved-${s.id}">✓ Salvato</div>
          <button class="btn-salva-sett" onclick="salvaSettimana(${s.id})">Salva Settimana</button>
        </div>
      `;
      container.appendChild(block);

      const grid = document.getElementById(`grid-${s.id}`);
      GIORNI.forEach((g, i) => {
        const key = s.id + '_' + i;
        const stato = dispMap[key] ? dispMap[key].stato : '';
        const row = document.createElement('div');
        row.className = 'giorno-row';
        row.innerHTML = `
          <div class="giorno-label">${g}</div>
          <div class="disp-btns" data-sett="${s.id}" data-idx="${i}">
            <button class="disp-btn ${stato==='disponibile'?'sel-disp':''}" onclick="setStato(this, 'disponibile')">Sì</button>
            <button class="disp-btn ${stato==='forse'?'sel-forse':''}" onclick="setStato(this, 'forse')">?</button>
            <button class="disp-btn ${stato==='non_disponibile'?'sel-no':''}" onclick="setStato(this, 'non_disponibile')">No</button>
          </div>
        `;
        grid.appendChild(row);
      });
    });
  }

  window.setStato = (btn, val) => {
    const parent = btn.parentElement;
    parent.querySelectorAll('.disp-btn').forEach(b => b.classList.remove('sel-disp', 'sel-forse', 'sel-no'));
    const cls = val === 'disponibile' ? 'sel-disp' : val === 'forse' ? 'sel-forse' : 'sel-no';
    btn.classList.add(cls);
    parent.dataset.val = val;
  };

  window.salvaSettimana = async (settId) => {
    const rows = document.querySelectorAll(`.disp-btns[data-sett="${settId}"]`);
    for (const r of rows) {
      const stato = r.dataset.val;
      if (!stato) continue;
      const idx = r.dataset.idx;
      
      // Upsert: prova a vedere se esiste già
      const { data: exist } = await sb.from('disponibilita')
        .select('id').eq('user_id', currentUser.id).eq('settimana_id', settId).eq('giorno_index', idx).maybeSingle();
      
      const payload = { user_id: currentUser.id, nome: currentUser.nome, settimana_id: settId, giorno_index: idx, stato };
      
      if (exist) await sb.from('disponibilita').update(payload).eq('id', exist.id);
      else await sb.from('disponibilita').insert([payload]);
    }
    document.getElementById(`saved-${settId}`).style.display = 'block';
    toast('Salvato!', 'success');
  };

  // --- TABS ---
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.tab-btn, .tab-panel').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const target = b.dataset.tab;
      document.getElementById(target).classList.add('active');
      if (target === 'tab-disponibilita') caricaDisponibilita();
    };
  });

  // Init
  const saved = sessionStorage.getItem('cu');
  if (saved) { currentUser = JSON.parse(saved); mostraApp(); }

})();
</script>
</body>
</html>
